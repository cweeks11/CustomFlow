<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Order Detail — Cope Aesthetic Customs</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<!--
  PAGE: Customer Order Detail (customer-order-detail.html)
  ============================================================
  PURPOSE:
    The customer's view of a single order. Shows current status,
    pipeline progress, payments, tracking numbers, Buffy's mockups,
    and allows the customer to upload reference photos and request revisions.

  HOW TO NAVIGATE HERE:
    From customer-portal.html — click any order row.
    URL param: customer-order-detail.html?id=1047

  WHAT'S ON THIS PAGE:
    1. Status hero with pipeline progress bar
    2. Waitlist message — contextual message based on current status
       (e.g. "You're on the Free Waitlist — pay booking fee to secure your spot")
    3. Order details + payments (2-column)
    4. Inbound tracking — customer enters their shipping tracking number here
    5. Outbound tracking — read-only, populated by Buffy when she ships it back
    6. Reference photos — customer can upload inspiration images
    7. Mockup gallery — read-only, Buffy uploads these from admin side
    8. Revision panel — shows how many free revisions are left, request more
    9. Order timeline — status history log
   10. Contact Buffy shortcuts (email + phone)

  KEY FUNCTIONS:
    render()         — builds the full page from current ORDER state
    renderGal()      — renders a photo gallery (deletable or read-only)
    addRefPhotos()   — handles file input change, reads as base64, adds to gallery
    saveInbound()    — saves the customer's shipping tracking number
    openRevModal()   — opens revision request modal (shows paid warning if >3 used)
    submitRevision() — appends revision to local array and re-renders

  BACKEND TODO:
    render data      → GET /api/orders/:id
    saveInbound()    → PATCH /api/orders/:id  { inbound_tracking: '...' }
    addRefPhotos()   → POST /api/order_images  (multipart, type: 'reference')
    submitRevision() → POST /api/revisions     { order_id, notes }
  ============================================================
-->
<script src="core.js"></script>
<script src="navbar.js"></script>

<div class="page page-sm">
  <a href="customer-portal.html" class="back preview-hide">← Back to My Orders</a>
  <div id="wrap"><div class="spin"></div></div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" onclick="closeLb()"><button class="lb-x" onclick="closeLb()">✕</button><img id="lbImg" src="" alt=""/></div>
<div class="toast" id="toast"></div>

<script>

  // Admin "Customer View" preview mode
  const params = new URLSearchParams(location.search);
  const _previewToken = params.get('preview_token');
  const _isPreview = !!_previewToken;

  if (_isPreview) {
    sessionStorage.setItem('preview_customer_token', _previewToken);

    // Hide all action buttons — read-only view
    const style = document.createElement('style');
    style.textContent = '.preview-hide { display: none !important; }';
    document.head.appendChild(style);

    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#2c3e50;color:#f39c12;text-align:center;padding:8px 16px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;';
    banner.innerHTML = '👁 Admin Preview — Read Only &nbsp;·&nbsp; <a href="javascript:window.close()" style="color:#e74c3c;text-decoration:underline;">Close Tab</a>';
    document.body.prepend(banner);
  }

  // In preview mode skip auth check (no customer token in localStorage)
  if (!_isPreview) requireCustomerAuth();

  const user = _isPreview ? {} : JSON.parse(localStorage.getItem('customer_user')||'{}');
  if (!_isPreview) renderCustomerNav('customer-portal.html');

  const OID = parseInt(params.get('id'));
  if (!OID) { window.location.href = 'customer-portal.html'; }

  // previewAwareFetch — uses sessionStorage preview token instead of localStorage
  // so Buffy's session is never affected
  async function previewAwareFetch(endpoint, options = {}) {
    if (_isPreview) {
      const token = sessionStorage.getItem('preview_customer_token');
      const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}), ...options.headers };
      try {
        const res = await fetch(endpoint, { ...options, headers });
        const data = await res.json();
        return { ok: res.ok, status: res.status, data };
      } catch(e) { return null; }
    }
    return customerApiFetch(endpoint, options);
  }

  const pip = ['free_waitlist','paid_waitlist','production_queue','prep','painting','completed','shipped','closed'];

  // ---- Module-level state (populated by loadPage) ----
  let ORDER        = {};
  let detail       = {};
  let payments     = [];
  let mockups      = [];
  let revisions    = [];
  let statusHist   = [];
  let consults     = [];
  let addons       = [];
  let refImgs      = [];
  let mockImgs     = [];
  let moodboardImgs= [];
  let conceptImgs  = [];
  let latestMockup = null;
  let myRefPhotos  = [];

  async function loadPage() {
    if (_isPreview) {
      // Add top margin since nav is hidden but banner is showing
      const page = document.querySelector('.page');
      if (page) page.style.marginTop = '54px';
    }
    const detailResult = await previewAwareFetch('/api/orders/' + OID);
    if (!detailResult || !detailResult.ok) {
      window.location.href = 'customer-portal.html';
      return;
    }
    detail       = detailResult.data;
    ORDER        = detail.order        || {};
    payments     = detail.payments     || [];
    mockups      = detail.mockups      || [];
    revisions    = detail.revisions    || [];
    statusHist   = detail.status_history || [];
    consults     = detail.consult_calls || [];
    addons       = detail.add_ons      || [];
    refImgs      = (detail.order_images||[]).filter(i=>i.type==='reference');
    mockImgs     = (detail.order_images||[]).filter(i=>i.type==='mockup');
    moodboardImgs= (detail.order_images||[]).filter(i=>i.type==='moodboard');
    conceptImgs  = (detail.order_images||[]).filter(i=>i.type==='concept_art');
    latestMockup = mockups.length ? mockups[mockups.length-1] : null;
    // Populate myRefPhotos from saved reference images
    myRefPhotos  = refImgs.filter(i=>i.url).map(i=>i.url);
    render();
    renderCustInvoices();
  }

  loadPage();

  function render() {
    const pidx = pip.indexOf(ORDER.status);
    const freeRevs = 3;
    const usedRevs = revisions.length;
    const mockupApproved = mockups.some(m=>m.approved);
    const totalPaid = payments.reduce((s,p)=>s+(p.status==='paid'?parseFloat(p.amount):0),0);

    document.getElementById('wrap').innerHTML = `
      <!-- STATUS HERO -->
      <div class="card" style="margin-bottom:20px;padding:26px 28px;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--mg),var(--vio-l));"></div>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;">
          <div>
            <div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--txt-m);margin-bottom:5px;">Order #${ORDER.id}</div>
            <div style="font-size:26px;font-weight:700;letter-spacing:1px;text-transform:uppercase;line-height:1;margin-bottom:8px;">${ORDER.item_type}</div>
            <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--txt-m);">
              <span style="text-transform:capitalize;">🎨 ${ORDER.pricing_tier||'—'}</span>
              <span>📅 ${formatDate(ORDER.created_at)}</span>
              ${ORDER.must_have_by?`<span style="color:var(--warn);">⏰ Needed by ${formatDate(ORDER.must_have_by)}</span>`:''}
              ${ORDER.is_rush?`<span style="color:var(--warn);font-weight:700;">⚡ Rush${ORDER.rush_approved?' — Approved':' — Pending Buffy\'s approval'}</span>`:''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            ${statusBadge(ORDER.status)}
            <div style="font-size:11px;color:var(--txt-m);">Updated ${timeAgo(ORDER.updated_at)}</div>
          </div>
        </div>
        <!-- PIPELINE -->
        <div class="pipeline" style="margin-top:18px;">
          <div class="pip-track">
            ${pip.map((s,i)=>`
              <div style="display:flex;align-items:center;flex-shrink:0;">
                <div class="pip-node ${i<pidx?'past':i===pidx?'active':'future'}">${STATUSES[s].label}</div>
                ${i<pip.length-1?`<div class="pip-conn ${i<pidx?'past':'future'}"></div>`:''}
              </div>`).join('')}
          </div>
        </div>
      </div>

      <!-- WAITLIST STATUS MESSAGE -->
      ${ORDER.status==='free_waitlist'?`
      <div style="padding:16px 20px;background:rgba(133,132,136,0.06);border:1px solid rgba(133,132,136,0.2);border-radius:8px;margin-bottom:18px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--chr);margin-bottom:6px;">📋 You're on the Free Waitlist</div>
        <div style="font-size:13px;color:var(--txt-m);margin-bottom:12px;">Buffy will reach out with a quote. Pay the $50 booking fee to lock your spot and move to the Paid Waitlist.</div>
        <div style="font-size:11px;color:var(--txt-d);">Current production start: <strong style="color:var(--gld);">Check with Buffy for availability</strong></div>
      </div>` : ''}
      ${ORDER.status==='paid_waitlist'?`
      <div style="padding:16px 20px;background:rgba(216,188,132,0.06);border:1px solid rgba(216,188,132,0.2);border-radius:8px;margin-bottom:18px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gld);margin-bottom:6px;">💳 Paid Waitlist — You're in!</div>
        <div style="font-size:13px;color:var(--txt-m);">Your spot is secured. Pay your full invoice to move into the Production Queue when it's your turn.</div>
      </div>` : ''}

      <!-- 2-COL: Order Details + Payments -->
      <div class="g2" style="margin-bottom:18px;">
        <div class="card">
          <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--gld);"></span>Your Order</div></div>
          <div style="display:flex;flex-direction:column;gap:12px;font-size:13px;">
            ${crow('Item Type', ORDER.item_type)}
            ${crow('Pricing Tier', ORDER.pricing_tier||'—', true)}
            ${crow('Design Notes', '')}
          </div>
          <div style="font-family:var(--fb);font-style:italic;font-size:15px;color:var(--txt-m);line-height:1.7;margin-top:4px;">"${ORDER.customer_notes||'No notes provided.'}"</div>
          ${addons.length?`<div style="margin-top:14px;border-top:1px solid var(--b1);padding-top:12px;"><div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-m);margin-bottom:8px;">Add-Ons</div>${addons.map(a=>`<div style="font-size:13px;color:var(--txt-m);">✓ ${a.name} — <span style="color:var(--gld);">${formatCurrency(a.price)}</span></div>`).join('')}</div>`:''}
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--ok);"></span>Payments</div></div>
          ${payments.length?payments.map(p=>`
            <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--b1);font-size:13px;">
              <span style="color:var(--txt-m);text-transform:capitalize;">${p.type} fee</span>
              <span style="color:var(--gld);font-weight:700;">${formatCurrency(p.amount)}</span>
            </div>`).join('')+`<div style="padding-top:10px;font-size:12px;color:var(--txt-m);">Total paid: <strong style="color:var(--ok);">${formatCurrency(totalPaid)}</strong></div>` : '<div style="font-size:13px;color:var(--txt-d);">No payments recorded yet.</div>'}
          <div style="margin-top:14px;padding:10px 12px;background:rgba(216,188,132,0.07);border:1px solid rgba(216,188,132,0.15);border-radius:6px;font-size:12px;color:var(--txt-m);">
            💡 Pay via <strong>Zelle, Venmo, or CashApp</strong> to Buffy after she sends your invoice. Then message her with confirmation.
          </div>
        </div>
      </div>

      <!-- INVOICES FROM BUFFY -->
      <div class="card" style="margin-bottom:18px;">
        <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--gld);"></span>Documents from Buffy</div></div>
        <div id="custInvoices"></div>
      </div>

      <!-- TRACKING -->
      <div class="g2" style="margin-bottom:18px;">
        <div class="card">
          <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--chr);"></span>Inbound — Your Item to Buffy</div></div>
          <div style="font-size:12px;color:var(--txt-m);margin-bottom:10px;">Send your item to Buffy using insured, tracked shipping. Enter your tracking # below.</div>
          ${ORDER.inbound_tracking?`<div class="track-num">${ORDER.inbound_tracking}</div><div style="font-size:11px;color:var(--txt-d);">Tracking on file</div>`:''}
          <div style="display:flex;gap:8px;margin-top:10px;">
            <input type="text" class="fc" id="inboundTrk" placeholder="Your tracking number" value="${ORDER.inbound_tracking||''}" style="flex:1;letter-spacing:1.5px;"/>
            <button class="btn btn-gld btn-sm preview-hide" onclick="saveInbound()">Save</button>
          </div>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title"><span class="card-dot"></span>Outbound — Buffy to You</div></div>
          <div style="font-size:12px;color:var(--txt-m);margin-bottom:10px;">Once your piece is complete and shipped, your tracking number will appear here.</div>
          ${ORDER.outbound_tracking
            ? `<div class="track-num">${ORDER.outbound_tracking}</div><div style="font-size:11px;color:var(--txt-d);margin-top:3px;">${ORDER.outbound_carrier||''}</div>`
            : `<div class="track-num empty">Awaiting shipment...</div>`}
        </div>
      </div>

      <!-- MY REFERENCE PHOTOS -->
      <div class="card" style="margin-bottom:18px;">
        <div class="card-head">
          <div class="card-title"><span class="card-dot" style="background:var(--chr);"></span>My Reference Photos</div>
          <label class="btn btn-out btn-sm preview-hide" style="cursor:pointer;">+ Add Photos<input type="file" accept="image/*" multiple style="display:none;" onchange="addRefPhotos(event)"/></label>
        </div>
        <div style="font-size:12px;color:var(--txt-m);margin-bottom:10px;">Upload inspiration photos, references, or logos for Buffy to reference.</div>
        <div class="gallery" id="refGal"><div class="gmt">No reference photos yet.</div></div>
      </div>

      <!-- MOODBOARD FROM BUFFY -->
      <div class="card" style="margin-bottom:18px;">
        <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--mg);"></span>Moodboard</div></div>
        <div style="font-size:12px;color:var(--txt-m);margin-bottom:10px;">Buffy will share the overall aesthetic direction and color palette here.</div>
        <div class="gallery" id="moodboardGal"><div class="gmt">Moodboard not uploaded yet.</div></div>
      </div>

      <!-- CONCEPT ART FROM BUFFY -->
      <div class="card" style="margin-bottom:18px;">
        <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--vio-l);"></span>Concept Art</div></div>
        <div style="font-size:12px;color:var(--txt-m);margin-bottom:10px;">Initial design sketches from Buffy — a preview of the creative direction.</div>
        <div class="gallery" id="conceptGal"><div class="gmt">Concept art not uploaded yet.</div></div>
      </div>

      <!-- MOCKUP + APPROVAL -->
      <div class="card" style="margin-bottom:18px;">
        <div class="card-head"><div class="card-title"><span class="card-dot"></span>Final Mockup — Your Approval Required</div></div>
        <div style="font-size:12px;color:var(--txt-m);margin-bottom:14px;">Buffy will upload the final design mockup here. You must approve before painting begins. You get 3 free revision requests.</div>
        <div class="gallery" id="mockupGal"><div class="gmt">Mockup not uploaded yet. Buffy will share when ready.</div></div>

        ${mockups.length > 0 ? (() => {
          const latest = mockups[mockups.length - 1];
          if (latest.approved) {
            return `<div style="margin-top:14px;padding:12px 16px;background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.25);border-radius:8px;display:flex;align-items:center;gap:10px;">
              <span style="font-size:20px;">✅</span>
              <div>
                <div style="font-size:13px;font-weight:700;color:var(--ok);">You approved this design!</div>
                <div style="font-size:11px;color:var(--txt-d);">Buffy can now begin painting. ${latest.approval_at ? 'Approved ' + formatDate(latest.approval_at) : ''}</div>
              </div>
            </div>`;
          } else {
            return `<div style="margin-top:14px;padding:14px 16px;background:rgba(242,23,165,0.05);border:1px solid rgba(242,23,165,0.15);border-radius:8px;">
              <div style="font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mg);margin-bottom:10px;">⏳ Awaiting Your Approval</div>
              <div style="font-size:13px;color:var(--txt-m);margin-bottom:14px;">Review the mockup above. Once you approve, Buffy will begin painting. If you'd like changes, describe them below.</div>
              <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;" class="preview-hide">
                <button class="btn btn-mg" onclick="approveMockup(${latest.id}, true)">✅ Approve & Let Buffy Paint</button>
                <button class="btn btn-out" onclick="openRequestChanges(${latest.id})">✏️ Request Changes</button>
              </div>
              <div id="changesForm_${latest.id}" style="display:none;">
                <div class="fg">
                  <label class="fl">What would you like changed? <span style="color:var(--err);">*</span></label>
                  <textarea class="fc" id="changesNote_${latest.id}" rows="3" placeholder="Please describe exactly what you'd like adjusted — colors, proportions, details, etc."></textarea>
                </div>
                <div style="display:flex;gap:8px;margin-top:8px;">
                  <button class="btn btn-gld" onclick="submitChanges(${latest.id})">Submit Revision Request</button>
                  <button class="btn btn-out btn-sm" onclick="document.getElementById('changesForm_${latest.id}').style.display='none'">Cancel</button>
                </div>
                <div style="font-size:11px;color:var(--txt-d);margin-top:8px;">Revision ${usedRevs+1} of 3 free · ${usedRevs >= 3 ? '<span style=\"color:var(--warn)\">Additional revisions are $20 each</span>' : 'This revision is free'}</div>
              </div>
            </div>`;
          }
        })() : ''}
      </div>

      <!-- REVISIONS -->
      <div class="card" style="margin-bottom:18px;">
        <div class="card-head">
          <div class="card-title"><span class="card-dot" style="background:var(--vio-l);"></span>Design Revisions
            <span style="font-size:11px;font-weight:400;color:var(--txt-m);text-transform:none;letter-spacing:0;">— ${usedRevs}/${freeRevs} free revisions used</span>
          </div>
          ${usedRevs<freeRevs?`<button class="btn btn-out btn-sm preview-hide" onclick="openRevModal()">+ Request Revision</button>`:'<span style="font-size:11px;color:var(--warn);">3 free used — paid revisions only</span>'}
        </div>
        <div style="padding:10px 0;margin-bottom:8px;font-size:12px;color:var(--txt-m);">
          Up to 3 revisions are included free. After that, additional revisions are $20 each.
        </div>
        ${revisions.length ? revisions.map(r=>`
          <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1);font-size:13px;">
            <div style="width:24px;height:24px;border-radius:50%;background:${r.revision_number<=freeRevs?'rgba(46,204,113,0.1)':'rgba(232,160,32,0.1)'};color:${r.revision_number<=freeRevs?'var(--ok)':'var(--warn)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">R${r.revision_number}</div>
            <div style="flex:1;color:var(--txt-m);">${r.notes||'—'}</div>
            <div style="color:var(--txt-d);font-size:11px;white-space:nowrap;">${formatDate(r.created_at)}</div>
          </div>`).join('') : '<div style="font-size:13px;color:var(--txt-d);">No revisions yet.</div>'}
      </div>

      <!-- STATUS HISTORY -->
      <div class="card" style="margin-bottom:18px;">
        <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--chr);"></span>Order Timeline</div></div>
        ${statusHist.length ? statusHist.map(h=>`
          <div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--b1);font-size:13px;">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--mg);flex-shrink:0;margin-top:5px;"></div>
            <div>
              <span style="color:var(--txt-m);">${STATUSES[h.from_status]?.label||h.from_status} →</span>
              <strong> ${STATUSES[h.to_status]?.label||h.to_status}</strong>
              ${h.note?`<div style="font-size:12px;color:var(--txt-m);margin-top:2px;">${h.note}</div>`:''}
            </div>
            <div style="margin-left:auto;font-size:11px;color:var(--txt-d);white-space:nowrap;">${formatDate(h.changed_at)}</div>
          </div>`).join('') : '<div style="font-size:13px;color:var(--txt-d);">No activity yet.</div>'}
      </div>

      <!-- CONTACT BUFFY -->
      <div style="padding:16px 20px;background:var(--s1);border:1px solid var(--b1);border-radius:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div style="font-size:13px;color:var(--txt-m);">Questions about your order?</div>
        <div style="display:flex;gap:10px;">
          <a href="mailto:CopeAestheticCustoms@gmail.com?subject=Order #${ORDER.id}" class="btn btn-out btn-sm">📧 Email Buffy</a>
          <a href="tel:9192952569" class="btn btn-gld btn-sm">📞 Call</a>
        </div>
      </div>`;

    // Render galleries
    renderGal('refGal', myRefPhotos, true);
    renderGal('mockupGal',    mockImgs.filter(i=>i.url).map(i=>i.url), false);
    renderGal('moodboardGal', moodboardImgs.filter(i=>i.url).map(i=>i.url), false);
    renderGal('conceptGal',   conceptImgs.filter(i=>i.url).map(i=>i.url), false);
  }

  function crow(label, val, cap=false) {
    return `<div style="display:flex;justify-content:space-between;"><span style="color:var(--txt-m);">${label}</span><span style="font-weight:600;${cap?'text-transform:capitalize;':''}">${val||'—'}</span></div>`;
  }

  function renderGal(id, imgs, canDel) {
    const el=document.getElementById(id); if(!el) return;
    if(!imgs.length){el.innerHTML='<div class="gmt">None yet.</div>';return;}
    el.innerHTML=imgs.map((src,i)=>`
      <div class="gthumb">
        <img src="${src||'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%231F1F1F%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'}" onclick="openLb(this.src)"/>
        ${canDel?`<button class="gdel" onclick="delRef(${i})">✕</button>`:''}
      </div>`).join('');
  }

  function addRefPhotos(e) {
    Array.from(e.target.files).forEach(f=>{
      const r=new FileReader();
      r.onload=async ev=>{
        const url = ev.target.result;
        // Save to API
        const res = await customerApiFetch('/api/orders/' + OID + '/images', {
          method: 'POST',
          body: JSON.stringify({ url, type: 'reference' })
        });
        if (res && res.ok) {
          myRefPhotos.push(url);
          renderGal('refGal', myRefPhotos, true);
          showToast('Reference photo saved!');
        } else {
          showToast('Failed to save photo — please try again.', 'error');
        }
      };
      r.readAsDataURL(f);
    });
    e.target.value='';
  }

  async function delRef(i) {
    // Find the matching image id from refImgs
    const img = refImgs[i];
    if (img && img.id) {
      await customerApiFetch('/api/orders/' + OID + '/images/' + img.id, { method: 'DELETE' });
      refImgs.splice(i, 1);
    }
    myRefPhotos.splice(i, 1);
    renderGal('refGal', myRefPhotos, true);
  }

  async function saveInbound() {
    const v = document.getElementById('inboundTrk').value.trim();
    if (!v) { showToast('Enter a tracking number.', 'warning'); return; }
    const res = await customerApiFetch('/api/orders/' + OID, {
      method: 'PATCH',
      body: JSON.stringify({ inbound_tracking: v })
    });
    if (res && res.ok) {
      ORDER.inbound_tracking = v;
      render();
      showToast('Tracking saved! Buffy will see this.');
    } else {
      showToast('Failed to save tracking number.', 'error');
    }
  }

  function openRevModal() {
    const usedRevs=revisions.length, freeRevs=3;
    const isPaid=usedRevs>=freeRevs;
    const modal=document.createElement('div'); modal.className='overlay open'; modal.id='revModal';
    modal.innerHTML=`<div class="modal">
      <button class="modal-x" onclick="document.getElementById('revModal').remove()">✕</button>
      <div class="modal-title">Request a Revision</div>
      ${isPaid?`<div style="padding:10px 12px;background:rgba(232,160,32,0.1);border:1px solid rgba(232,160,32,0.25);border-radius:6px;font-size:12px;color:var(--warn);margin-bottom:14px;">This is revision #${usedRevs+1} — beyond your 3 free. A $20 charge will apply.</div>`:''}
      <div class="fg"><label class="fl">What changes would you like?</label><textarea class="fc" id="revNotes" rows="5" placeholder="Be specific! e.g. Make the stars larger, change the blue to navy..."></textarea></div>
      <button class="btn btn-mg" style="width:100%;justify-content:center;margin-top:8px;" onclick="submitRevision()">Submit Revision Request</button>
    </div>`;
    document.body.appendChild(modal);
  }

  async function submitRevision() {
    const notes = document.getElementById('revNotes').value.trim();
    if (!notes) { showToast('Please describe the changes.', 'warning'); return; }
    const res = await customerApiFetch('/api/revisions', {
      method: 'POST',
      body: JSON.stringify({ order_id: OID, notes })
    });
    if (res && res.ok) {
      revisions.push(res.data.revision || {
        id: Date.now(), order_id: OID,
        revision_number: revisions.length + 1,
        notes, created_at: new Date().toISOString(),
        charge_amount: revisions.length >= 3 ? 20 : 0
      });
      document.getElementById('revModal').remove();
      render();
      showToast('Revision request sent to Buffy!');
    } else {
      showToast('Failed to submit revision — please try again.', 'error');
    }
  }

  async function approveMockup(mockupId, approved) {
    const res = await customerApiFetch('/api/mockups/' + mockupId + '/approve', {
      method: 'POST',
      body: JSON.stringify({ approved, notes: '' })
    });
    if (res && res.ok) {
      const refreshed = await customerApiFetch('/api/orders/' + OID);
      if (refreshed && refreshed.ok) {
        mockups      = refreshed.data.mockups || [];
        latestMockup = mockups.length ? mockups[mockups.length - 1] : null;
        revisions    = refreshed.data.revisions || [];
      }
      render();
      renderCustInvoices();
      showToast('✅ Mockup approved! Buffy will start painting.');
    } else {
      showToast('Failed to submit — please try again.', 'error');
    }
  }

  function openRequestChanges(mockupId) {
    const form = document.getElementById('changesForm_' + mockupId);
    if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
  }

  async function submitChanges(mockupId) {
    const notes = (document.getElementById('changesNote_' + mockupId) || {}).value?.trim();
    if (!notes) { showToast('Please describe the changes you want.', 'warning'); return; }

    // POST to approve endpoint with approved=false — this creates the revision on the backend
    const res = await customerApiFetch('/api/mockups/' + mockupId + '/approve', {
      method: 'POST',
      body: JSON.stringify({ approved: false, notes })
    });
    if (res && res.ok) {
      // Reload order to get updated revisions + mockup state
      const refreshed = await customerApiFetch('/api/orders/' + OID);
      if (refreshed && refreshed.ok) {
        mockups   = refreshed.data.mockups   || [];
        revisions = refreshed.data.revisions || [];
        latestMockup = mockups.length ? mockups[mockups.length - 1] : null;
      }
      render();
      renderCustInvoices();
      showToast('📝 Changes requested — Buffy has been notified!');
    } else {
      showToast('Failed to submit changes — please try again.', 'error');
    }
  }

  // renderCustInvoices() — shows all estimates, invoices, and receipts Buffy has sent.
  // Documents are grouped by type and show the doc number (e.g. 20261011I).
  // Customers only see docs with status='sent'. Admins in preview mode see all.
  function renderCustInvoices() {
    const el = document.getElementById('custInvoices');
    if (!el) return;
    const docs = (detail.invoices || []).filter(d => d.status === 'sent');
    if (!docs.length) {
      el.innerHTML = `<div style="font-size:13px;color:var(--txt-d);padding:4px 0;">No documents sent yet. Buffy will send your estimate or invoice once she's reviewed your order.</div>`;
      return;
    }

    const TYPE_ICON  = { estimate:'📋', invoice:'🧾', receipt:'✅' };
    const TYPE_COLOR = { estimate:'var(--chr)', invoice:'var(--gld)', receipt:'var(--ok)' };
    const TYPE_LABEL = { estimate:'Estimate', invoice:'Invoice', receipt:'Receipt' };

    el.innerHTML = docs.map(d => {
      const icon  = TYPE_ICON[d.doc_type]  || '📄';
      const color = TYPE_COLOR[d.doc_type] || 'var(--gld)';
      const label = TYPE_LABEL[d.doc_type] || 'Document';
      return `
      <div style="display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--b1);flex-wrap:wrap;">
        <div style="width:36px;height:36px;border-radius:8px;background:rgba(216,188,132,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">${icon}</div>
        <div style="flex:1;min-width:160px;">
          <div style="font-size:13px;font-weight:700;color:var(--txt);">${label}
            <span style="font-size:11px;font-weight:400;color:var(--txt-d);margin-left:6px;">#${d.doc_number||''}</span>
          </div>
          <div style="font-size:12px;color:var(--txt-m);">
            ${formatCurrency(d.subtotal||d.amount||0)}
            ${d.sent_at ? ' · Sent ' + formatDate(d.sent_at) : ''}
          </div>
          ${d.line_items && d.line_items.length ? `
            <div style="font-size:11px;color:var(--txt-d);margin-top:3px;">
              ${d.line_items.map(li => li.label + ': ' + formatCurrency(li.amount)).join(' · ')}
            </div>` : ''}
          ${d.notes ? `<div style="font-size:11px;color:var(--txt-m);margin-top:4px;font-style:italic;">${d.notes}</div>` : ''}
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
          <span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ok);">✔ Received</span>
          <button class="btn btn-gld btn-sm" onclick="previewCustDoc(${d.id})">👁 View</button>
        </div>
      </div>`}).join('') + `
      <div style="margin-top:12px;padding:10px 12px;background:rgba(216,188,132,0.06);border:1px solid rgba(216,188,132,0.12);border-radius:6px;font-size:12px;color:var(--txt-m);">
        💳 Pay via <strong>Zelle, Venmo, or CashApp</strong> to Buffy after receiving your invoice. Message her with your confirmation number.
      </div>`;
  }

  // Build and open a printable view of a document
  function previewCustDoc(docId) {
    const d = (detail.invoices || []).find(i => i.id === docId);
    if (!d) return;
    const TYPE_LABEL = { estimate:'Estimate', invoice:'Invoice', receipt:'Receipt' };
    const TYPE_COLOR = { estimate:'#2980b9', invoice:'#c0932b', receipt:'#27ae60' };
    const label = TYPE_LABEL[d.doc_type] || 'Document';
    const color = TYPE_COLOR[d.doc_type] || '#c0932b';
    const items = d.line_items || [];
    const subtotal = d.subtotal || d.amount || 0;
    const rows = items.map(i => `
      <tr>
        <td style="padding:10px 14px;border-bottom:1px solid #eee;color:#333;">${i.label}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #eee;text-align:right;font-weight:600;">$${parseFloat(i.amount).toFixed(2)}</td>
      </tr>`).join('');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
      <title>${label} ${d.doc_number}</title>
      <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Helvetica Neue',Arial,sans-serif;color:#111;background:#fff;padding:48px;}
        .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;}
        .brand{font-size:22px;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
        .brand-sub{font-size:11px;color:#888;letter-spacing:1px;margin-top:3px;}
        .doc-type{font-size:36px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:${color};}
        .doc-num{font-size:13px;color:#888;margin-top:4px;letter-spacing:1px;}
        .meta{display:flex;gap:48px;margin-bottom:32px;padding:20px 0;border-top:2px solid #eee;border-bottom:2px solid #eee;}
        .meta-block .lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#aaa;margin-bottom:5px;}
        .meta-block .val{font-size:14px;font-weight:600;}
        table{width:100%;border-collapse:collapse;margin-bottom:20px;}
        th{background:${color};color:#fff;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:2px;}
        th:last-child{text-align:right;}
        .total-row td{padding:14px;font-size:16px;font-weight:800;border-top:2px solid #111;}
        .total-row td:last-child{color:${color};}
        .notes{margin-top:24px;padding:16px;background:#f9f9f9;border-left:3px solid ${color};font-size:13px;color:#555;}
        .footer{margin-top:48px;text-align:center;font-size:11px;color:#bbb;border-top:1px solid #eee;padding-top:20px;}
        @media print{body{padding:24px;}}
      </style>
    </head><body>
      <div class="header">
        <div>
          <div class="brand">Cope Aesthetic Customs</div>
          <div class="brand-sub">CopeAestheticCustoms@gmail.com · (919) 295-2569</div>
        </div>
        <div style="text-align:right;">
          <div class="doc-type">${label}</div>
          <div class="doc-num">#${d.doc_number||''}</div>
          <div style="font-size:11px;color:#aaa;margin-top:4px;">${d.sent_at ? new Date(d.sent_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : ''}</div>
        </div>
      </div>
      <div class="meta">
        <div class="meta-block">
          <div class="lbl">Order</div>
          <div class="val">#${d.order_id}</div>
        </div>
        <div class="meta-block">
          <div class="lbl">Date</div>
          <div class="val">${d.sent_at ? new Date(d.sent_at).toLocaleDateString() : new Date().toLocaleDateString()}</div>
        </div>
      </div>
      <table>
        <thead><tr><th>Description</th><th style="text-align:right;">Amount</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr class="total-row"><td>Total</td><td style="text-align:right;">$${parseFloat(subtotal).toFixed(2)}</td></tr></tfoot>
      </table>
      ${d.notes ? `<div class="notes"><strong>Notes:</strong> ${d.notes}</div>` : ''}
      <div class="footer">Cope Aesthetic Customs · customs.copeaesthetic.studio · Thank you! 🎨</div>
    </body></html>`;
    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
  }

  function openLb(src){document.getElementById('lbImg').src=src;document.getElementById('lb').classList.add('open');}
  function closeLb(){document.getElementById('lb').classList.remove('open');}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Order Detail — Cope Aesthetic Customs</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<!--
  PAGE: Admin Order Detail (admin-order-detail.html)
  ============================================================
  PURPOSE:
    The full management view for a single order. This is where Buffy
    does most of her daily work — updating status, logging payments,
    uploading mockups, approving rush requests, and communicating notes.

  HOW TO NAVIGATE HERE:
    From admin-orders.html — click any row or the "Manage" button.
    URL param: admin-order-detail.html?id=1047

  WHAT'S ON THIS PAGE:
    1. Hero — order header with pipeline bar and status dropdown
    2. Rush approval section — only visible if rush is pending
    3. Customer info + order details (2-column)
    4. Payments table + "Log Payment" modal
    5. Add-ons list + "Add Add-On" modal
    6. Inbound tracking (customer → Buffy) — admin can override
    7. Outbound tracking (Buffy → customer) — admin enters carrier + number
    8. Base photo upload (drag/drop)
    9. Customer reference photos (read-only gallery)
   10. Mockup gallery + "Add Revision Note" modal
   11. Revision history (free vs paid tracked)
   12. Consult calls + "Schedule Consult" modal
   13. Customer notes (read-only) + Admin notes (editable)
   14. Status history timeline
   15. Danger zone — quick status shortcuts

  KEY FUNCTIONS:
    render()         — rebuilds the entire page content from current state.
                       Called after every mutation (status change, payment added, etc.)
    updateStatus(val) — changes ORDER.status, appends to statusHist[], re-renders
    approveRush()    — sets rush_approved on the current ORDER object
    saveTracking()   — saves inbound or outbound tracking number
    handleUpload()   — reads image files and adds them to mockupImgs[] or basePhoots[]
    renderGallery()  — builds the thumbnail grid for any image array
    openAddPayment() — dynamically creates and appends a payment modal to <body>
    logPayment()     — pushes a new payment object to the payments[] array
    openAddAddon()   — modal for adding an add-on service
    openAddRevision() — modal for logging a revision (checks free vs paid threshold)
    logRevision()    — pushes a new revision with correct charge_amount
    openScheduleConsult() — modal for scheduling a consult call
    saveNotes()      — saves admin notes back to ORDER.admin_notes
    openLb() / closeLb() — lightbox for full-screen image viewing

  BACKEND TODO:
    render data      → GET /api/orders/:id (returns order + all related data)
    updateStatus()   → PATCH /api/orders/:id  { status: 'painting' }
    approveRush()    → PATCH /api/orders/:id  { rush_approved: true }
    saveTracking()   → PATCH /api/orders/:id  { outbound_tracking: '...', outbound_carrier: '...' }
    logPayment()     → POST /api/payments      { order_id, amount, type, method }
    addAddon()       → POST /api/add_ons       { order_id, name, price, quantity }
    logRevision()    → POST /api/revisions     { order_id, revision_number, notes, charge_amount }
    saveConsult()    → POST /api/consult_calls { order_id, scheduled_at, duration_minutes, notes }
    saveNotes()      → PATCH /api/orders/:id  { admin_notes: '...' }
    image upload     → POST /api/order_images  (multipart form with file + type)
  ============================================================
-->
<script src="core.js"></script>
<script src="navbar.js"></script>

<div class="page">
  <a href="admin-orders.html" class="back">← Back to Orders</a>
  <div id="heroWrap"><div class="spin"></div></div>
  <div id="mainContent" style="display:none;"></div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" onclick="closeLb()">
  <button class="lb-x" onclick="closeLb()">✕</button>
  <img id="lbImg" src="" alt="" onclick="event.stopPropagation()"/>
</div>

<div class="toast" id="toast"></div>

<script>
  requireAdminAuth();
  renderAdminNav('admin-orders.html');

  const params = new URLSearchParams(location.search);
  const OID = parseInt(params.get('id'));

  // All state variables — populated by loadOrderDetail() below
  let ORDER = {}, CUSTOMER = {}, USERS = {};
  let custPhotos=[], basePhoots=[], mockupImgs=[], moodboardImgs=[], conceptImgs=[];
  let mockups=[], revisions=[], payments=[], addons=[], statusHist=[], consults=[];

  // Load all order data from the real API
  async function loadOrderDetail() {
    if (!OID) { window.location.href = 'admin-orders.html'; return; }
    const result = await apiFetch('/api/orders/' + OID);
    if (!result || !result.ok) {
      document.body.innerHTML = '<div style="padding:60px;text-align:center;color:#E74C3C;">Order #'+OID+' not found.</div>';
      return;
    }
    const d = result.data;
    ORDER      = d.order || {};
    CUSTOMER   = d.customer || {};
    USERS[CUSTOMER.id] = CUSTOMER;
    custPhotos    = (d.order_images||[]).filter(i=>i.type==='reference').map(i=>i.url||'').filter(Boolean);
    basePhoots    = (d.order_images||[]).filter(i=>i.type==='base_photo').map(i=>i.url||'').filter(Boolean);
    mockupImgs    = (d.order_images||[]).filter(i=>i.type==='mockup').map(i=>i.url||'').filter(Boolean);
    moodboardImgs = (d.order_images||[]).filter(i=>i.type==='moodboard').map(i=>i.url||'').filter(Boolean);
    conceptImgs   = (d.order_images||[]).filter(i=>i.type==='concept_art').map(i=>i.url||'').filter(Boolean);
    mockups    = d.mockups || [];
    revisions  = d.revisions || [];
    payments   = d.payments || [];
    addons     = d.add_ons || [];
    statusHist = d.status_history || [];
    consults   = d.consult_calls || [];
    render();
    renderDocuments();
    renderGallery('refGal',       custPhotos,    false, 'reference');
    renderGallery('baseGal',      basePhoots,    false, 'base_photo');
    renderGallery('moodboardGal', moodboardImgs, true,  'moodboard');
    renderGallery('conceptGal',   conceptImgs,   true,  'concept_art');
    renderGallery('mockupGal',    mockupImgs,    true,  'mockup');
  }
  loadOrderDetail().then(() => setupDropZonesAfterLoad());

  const pip = ['free_waitlist','paid_waitlist','production_queue','prep','painting','completed','shipped','closed'];

  function render() {
    document.title = `Order #${ORDER.id} — ${CUSTOMER.name||''}`;

    // HERO
    const pidx = pip.indexOf(ORDER.status);
    document.getElementById('heroWrap').innerHTML = `
      <div class="card" style="margin-bottom:20px;padding:26px 28px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;">
          <div>
            <div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--txt-m);margin-bottom:5px;">Order #${ORDER.id}</div>
            <div style="font-size:28px;font-weight:700;letter-spacing:1px;text-transform:uppercase;line-height:1;margin-bottom:10px;">${CUSTOMER.name||'—'}</div>
            <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--txt-m);">
              <span>📦 ${ORDER.item_type}</span>
              <span>🎨 ${ORDER.pricing_tier||'—'}</span>
              <span>📅 ${formatDate(ORDER.created_at)}</span>
              ${ORDER.must_have_by?`<span style="color:var(--warn);">⏰ Due ${formatDate(ORDER.must_have_by)}</span>`:''}
              ${ORDER.is_rush?`<span style="color:var(--warn);font-weight:700;">⚡ RUSH${ORDER.rush_approved?' — Approved':' — PENDING APPROVAL'}</span>`:''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <div>
              <div class="fl" style="margin-bottom:5px;">Status</div>
              <select class="fc" id="statusSel" style="min-width:170px;" onchange="updateStatus(this.value)">
                ${pip.map(s=>`<option value="${s}" ${ORDER.status===s?'selected':''}>${STATUSES[s].label}</option>`).join('')}
              </select>
            </div>
            <div style="margin-top:18px;">${statusBadge(ORDER.status)}</div>
            <div style="margin-top:18px;">
              <button class="btn btn-out btn-sm" onclick="openCustomerView()" title="Preview this order as the customer sees it">
                👁 Customer View
              </button>
            </div>
          </div>
        </div>
        <!-- PIPELINE -->
        <div class="pipeline" style="margin-top:18px;">
          <div class="pip-track">
            ${pip.map((s,i)=>`
              <div style="display:flex;align-items:center;flex-shrink:0;">
                <div class="pip-node ${i<pidx?'past':i===pidx?'active':'future'}">${STATUSES[s].label}</div>
                ${i<pip.length-1?`<div class="pip-conn ${i<pidx?'past':'future'}"></div>`:''}
              </div>`).join('')}
          </div>
        </div>
      </div>`;

    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('mainContent').innerHTML = buildContent();

    // Re-attach drag/drop
    setupDropZone('mockupDrop','mockupFile', imgs => { mockupImgs.push(...imgs); renderGallery('mockupGal',mockupImgs,true,'mockup'); });
    setupDropZone('baseDrop','baseFile', imgs => { basePhoots.push(...imgs); renderGallery('baseGal',basePhoots,false,'base'); });
  }

  function buildContent() {
    const totalPaid = payments.reduce((s,p)=>s+(p.status==='paid'?parseFloat(p.amount):0),0);
    const freeRevs  = 3;
    const usedRevs  = revisions.length;
    const paidRevs  = Math.max(0, usedRevs - freeRevs);

    return `
    <!-- ROW 1: Customer + Order Info -->
    <div class="g2" style="margin-bottom:18px;">
      <div class="card">
        <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--chr);"></span>Customer Info</div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          ${irow('Name', CUSTOMER.name||'—')}
          ${irow('Email', CUSTOMER.email||'—')}
          ${irow('Phone', CUSTOMER.phone||'—')}
          ${irow('Member Since', formatDate(CUSTOMER.created_at))}
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--gld);"></span>Order Details</div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          ${irow('Item Type', ORDER.item_type)}
          ${irow('Pricing Tier', ORDER.pricing_tier||'—', true)}
          ${irow('Must Have By', formatDate(ORDER.must_have_by)||'Not set')}
          ${irow('Rush', ORDER.is_rush?(ORDER.rush_approved?'⚡ Approved':'⚡ Pending'):'No')}
          ${ORDER.is_rush&&ORDER.rush_fee?irow('Rush Fee', formatCurrency(ORDER.rush_fee)):''}
          ${irow('Booking Fee', ORDER.booking_fee_paid?'✔ Paid':'⚠ Unpaid', false, ORDER.booking_fee_paid?'var(--ok)':'var(--warn)')}
        </div>
      </div>
    </div>

    <!-- ROW 2: Rush Approval (if pending) -->
    ${ORDER.is_rush && !ORDER.rush_approved ? `
    <div style="margin-bottom:18px;padding:18px 20px;background:rgba(232,160,32,0.07);border:1px solid rgba(232,160,32,0.25);border-radius:10px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--warn);margin-bottom:12px;">⚡ Rush Request Pending Approval</div>
      <div style="font-size:13px;color:var(--txt-m);margin-bottom:14px;">Rush fee is calculated as 50% of the custom fee. Approve only if schedule allows.</div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-mg" onclick="approveRush(true)">✔ Approve Rush</button>
        <button class="btn btn-err" onclick="approveRush(false)">✕ Deny Rush Request</button>
      </div>
    </div>` : ''}

    <!-- ROW 3: Payments + Add-Ons -->
    <div class="g2" style="margin-bottom:18px;">
      <div class="card">
        <div class="card-head">
          <div class="card-title"><span class="card-dot" style="background:var(--ok);"></span>Payments</div>
          <button class="btn btn-out btn-sm" onclick="openAddPayment()">+ Add Payment</button>
        </div>
        <table style="width:100%;font-size:13px;">
          <thead><tr>
            <th style="padding:8px 0;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-m);border-bottom:1px solid var(--b1);">Type</th>
            <th style="padding:8px 0;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-m);border-bottom:1px solid var(--b1);">Amount</th>
            <th style="padding:8px 0;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-m);border-bottom:1px solid var(--b1);">Method</th>
            <th style="padding:8px 0;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-m);border-bottom:1px solid var(--b1);">Status</th>
          </tr></thead>
          <tbody>
            ${payments.map(p=>`<tr>
              <td style="padding:9px 0;color:var(--txt-m);text-transform:capitalize;border-bottom:1px solid var(--b1);">${p.type}</td>
              <td style="padding:9px 0;color:var(--gld);font-weight:700;border-bottom:1px solid var(--b1);">${formatCurrency(p.amount)}</td>
              <td style="padding:9px 0;color:var(--txt-m);border-bottom:1px solid var(--b1);">${p.method||'—'}</td>
              <td style="padding:9px 0;border-bottom:1px solid var(--b1);"><span style="color:${p.status==='paid'?'var(--ok)':'var(--warn)'};">${p.status}</span></td>
            </tr>`).join('')}
            <tr><td colspan="4" style="padding-top:10px;font-size:12px;color:var(--txt-m);">Total Paid: <strong style="color:var(--ok);">${formatCurrency(totalPaid)}</strong></td></tr>
          </tbody>
        </table>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="card-title"><span class="card-dot" style="background:var(--vio-l);"></span>Add-Ons</div>
          <button class="btn btn-out btn-sm" onclick="openAddAddon()">+ Add</button>
        </div>
        ${addons.length ? addons.map(a=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--b1);font-size:13px;">
            <span style="color:var(--txt);">${a.name}</span>
            <span style="color:var(--gld);">${formatCurrency(a.price)} × ${a.quantity}</span>
          </div>`).join('') : '<div style="font-size:13px;color:var(--txt-d);padding:8px 0;">No add-ons selected.</div>'}
      </div>
    </div>

    <!-- ROW 4: Tracking -->
    <div class="g2" style="margin-bottom:18px;">
      <div class="card">
        <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--chr);"></span>Inbound Tracking <span style="font-size:10px;color:var(--txt-d);font-weight:400;letter-spacing:1px;text-transform:none;"> — Customer → Buffy</span></div></div>
        <div style="background:var(--blk);border:1px solid var(--b1);border-radius:7px;padding:16px;margin-bottom:12px;">
          <div class="fl">Tracking #</div>
          <div class="track-num ${ORDER.inbound_tracking?'':'empty'}" id="inboundDisp">${ORDER.inbound_tracking||'Not yet provided'}</div>
          ${ORDER.inbound_carrier?`<div style="font-size:11px;color:var(--txt-d);margin-top:3px;">${ORDER.inbound_carrier}</div>`:''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input type="text" class="fc" id="inboundIn" placeholder="Enter or override tracking #" value="${ORDER.inbound_tracking||''}" style="flex:1;min-width:150px;letter-spacing:1.5px;"/>
          <button class="btn btn-ghost btn-sm" onclick="saveTracking('inbound')">Save</button>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title"><span class="card-dot"></span>Outbound Tracking <span style="font-size:10px;color:var(--txt-d);font-weight:400;letter-spacing:1px;text-transform:none;"> — Buffy → Customer</span></div></div>
        <div style="background:var(--blk);border:1px solid var(--b1);border-radius:7px;padding:16px;margin-bottom:12px;">
          <div class="fl">Tracking #</div>
          <div class="track-num ${ORDER.outbound_tracking?'':'empty'}" id="outboundDisp">${ORDER.outbound_tracking||'Not yet entered'}</div>
          ${ORDER.outbound_carrier?`<div style="font-size:11px;color:var(--txt-d);margin-top:3px;">${ORDER.outbound_carrier}</div>`:''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input type="text" class="fc" id="outboundIn" placeholder="Enter outbound tracking #" value="${ORDER.outbound_tracking||''}" style="flex:1;min-width:120px;letter-spacing:1.5px;"/>
          <select class="fc" id="carrierSel" style="width:auto;min-width:100px;">
            <option value="">Carrier</option>
            ${['USPS','UPS','FedEx','DHL'].map(c=>`<option ${(ORDER.outbound_carrier||'')==c?'selected':''}>${c}</option>`).join('')}
          </select>
          <button class="btn btn-mg btn-sm" onclick="saveTracking('outbound')">Save & Notify</button>
        </div>
      </div>
    </div>

    <!-- ROW 5: Base Photo + Customer References -->
    <div class="g2" style="margin-bottom:18px;">
      <div class="card">
        <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--chr);"></span>Base Photo <span style="font-size:10px;color:var(--txt-d);font-weight:400;text-transform:none;"> — item as received</span></div></div>
        <div class="drop-zone" id="baseDrop" style="margin-bottom:8px;">
          <input type="file" id="baseFile" accept="image/*" multiple onchange="handleUpload(event,'base_photo')"/>
          <div style="font-size:20px;opacity:0.3;margin-bottom:6px;">📷</div>
          <div class="drop-txt">Upload base photo</div>
          <div class="drop-sub">Photo of item before work begins</div>
        </div>
        <div class="gallery" id="baseGal"><div class="gmt">No base photo yet.</div></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--chr);"></span>Customer Reference Photos</div></div>
        <div class="gallery" id="refGal"><div class="gmt">No reference photos from customer.</div></div>
      </div>
    </div>

    <!-- ROW 6: Moodboard -->
    <div class="card" style="margin-bottom:18px;">
      <div class="card-head">
        <div class="card-title"><span class="card-dot" style="background:var(--mg);"></span>Moodboard
          <span style="font-size:11px;font-weight:400;color:var(--txt-m);text-transform:none;letter-spacing:0;"> — overall aesthetic direction</span>
        </div>
      </div>
      <div class="drop-zone" id="moodboardDrop" style="margin-bottom:14px;">
        <input type="file" id="moodboardFile" accept="image/*" multiple onchange="handleUpload(event,'moodboard')"/>
        <div style="font-size:20px;opacity:0.3;margin-bottom:6px;">🎨</div>
        <div class="drop-txt">Upload moodboard images</div>
        <div class="drop-sub">Color palettes, inspiration, overall vibe</div>
      </div>
      <div class="gallery" id="moodboardGal"><div class="gmt">No moodboard uploaded yet.</div></div>
    </div>

    <!-- ROW 7: Concept Art -->
    <div class="card" style="margin-bottom:18px;">
      <div class="card-head">
        <div class="card-title"><span class="card-dot" style="background:var(--vio-l);"></span>Concept Art
          <span style="font-size:11px;font-weight:400;color:var(--txt-m);text-transform:none;letter-spacing:0;"> — initial design sketches</span>
        </div>
      </div>
      <div class="drop-zone" id="conceptDrop" style="margin-bottom:14px;">
        <input type="file" id="conceptFile" accept="image/*" multiple onchange="handleUpload(event,'concept_art')"/>
        <div style="font-size:20px;opacity:0.3;margin-bottom:6px;">✏️</div>
        <div class="drop-txt">Upload concept art</div>
        <div class="drop-sub">Sketches and initial design concepts</div>
      </div>
      <div class="gallery" id="conceptGal"><div class="gmt">No concept art uploaded yet.</div></div>
    </div>

    <!-- ROW 8: Mockup + Approval Status + Revisions -->
    <div class="card" style="margin-bottom:18px;">
      <div class="card-head">
        <div class="card-title"><span class="card-dot"></span>Final Mockup
          <span style="font-size:11px;font-weight:400;color:var(--txt-m);text-transform:none;letter-spacing:0;">
            — ${usedRevs}/${freeRevs} free revisions used${paidRevs>0?` + ${paidRevs} paid`:''}
          </span>
        </div>
        <button class="btn btn-out btn-sm" onclick="openAddRevision()">+ Add Revision Note</button>
      </div>

      ${mockups.length > 0 ? `
        <div style="padding:10px 14px;border-radius:6px;margin-bottom:14px;${
          mockups[mockups.length-1].approved
            ? 'background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.25);'
            : 'background:rgba(232,160,32,0.08);border:1px solid rgba(232,160,32,0.2);'
        }display:flex;align-items:center;gap:10px;">
          <span style="font-size:16px;">${mockups[mockups.length-1].approved ? '✅' : '⏳'}</span>
          <div>
            <div style="font-size:12px;font-weight:700;color:${mockups[mockups.length-1].approved?'var(--ok)':'var(--warn)'};">
              ${mockups[mockups.length-1].approved ? 'Customer Approved' : 'Awaiting Customer Approval'}
            </div>
            ${mockups[mockups.length-1].approval_at
              ? `<div style="font-size:11px;color:var(--txt-d);">Approved ${formatDatetime(mockups[mockups.length-1].approval_at)}</div>`
              : `<div style="font-size:11px;color:var(--txt-d);">Uploaded — waiting for customer to review</div>`}
          </div>
        </div>` : ''}

      <div class="drop-zone" id="mockupDrop" style="margin-bottom:14px;">
        <input type="file" id="mockupFile" accept="image/*" multiple onchange="handleUpload(event,'mockup')"/>
        <div style="font-size:20px;opacity:0.3;margin-bottom:6px;">🖼</div>
        <div class="drop-txt">Upload mockup for customer approval</div>
        <div class="drop-sub">Customer will see this and can approve or request changes</div>
      </div>
      <div class="gallery" id="mockupGal"><div class="gmt">No mockup uploaded yet.</div></div>

      ${revisions.length ? `
        <div style="margin-top:16px;border-top:1px solid var(--b1);padding-top:14px;">
          <div class="fl" style="margin-bottom:10px;">Revision History</div>
          ${revisions.map(r=>`
            <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1);font-size:13px;">
              <div style="width:24px;height:24px;border-radius:50%;background:${r.revision_number<=freeRevs?'rgba(46,204,113,0.1)':'rgba(232,160,32,0.1)'};color:${r.revision_number<=freeRevs?'var(--ok)':'var(--warn)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">R${r.revision_number}</div>
              <div style="flex:1;color:var(--txt-m);">${r.notes||'—'}</div>
              <div style="color:${r.charge_amount?'var(--warn)':'var(--txt-d)'};white-space:nowrap;font-size:11px;">${r.charge_amount?formatCurrency(r.charge_amount)+' fee':'Free'}</div>
              <div style="color:var(--txt-d);font-size:11px;white-space:nowrap;">${formatDate(r.created_at)}</div>
            </div>`).join('')}
        </div>` : ''}
    </div>

    <!-- ROW 7: Consult Calls -->
    <div class="card" style="margin-bottom:18px;">
      <div class="card-head">

        <!-- Standard Fees Grid -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;" id="standardFeeGrid">
          ${['booking_fee','rush_fee','cleaning_fee','custom_fee','final_balance'].map(k => `
            <div>
              <div class="fl" style="margin-bottom:4px;">${({booking_fee:'Booking Fee',rush_fee:'Rush Fee',cleaning_fee:'Cleaning Fee',custom_fee:'Custom Fee',final_balance:'Final Balance'})[k]}</div>
              <div style="position:relative;">
                <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt-m);font-size:14px;">$</span>

        </div>

        <!-- Custom Add-Ons -->
        <div style="margin-bottom:16px;">

            <div class="fl">Custom Add-Ons</div>

            <button class="btn btn-out btn-sm" onclick="generateDoc('estimate')" style="flex:1;min-width:120px;">📋 Generate Estimate</button>
            <button class="btn btn-out btn-sm" onclick="generateDoc('invoice')"  style="flex:1;min-width:120px;">🧾 Generate Invoice</button>
            <button class="btn btn-gld btn-sm" onclick="generateDoc('receipt')"  style="flex:1;min-width:120px;">✅ Generate Receipt</button>
          </div>

      </div>

      <!-- DOCUMENTS LIST -->
      <div id="invoicesList" style="margin-top:${''};"></div>

    <!-- ROW 8: Notes + Status History -->
    <div class="g2" style="margin-bottom:18px;">
      <div class="card">
        <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--chr);"></span>Customer Notes</div></div>
        <div style="font-family:var(--fb);font-style:italic;font-size:16px;color:var(--txt-m);line-height:1.7;">"${ORDER.customer_notes||'No notes from customer.'}"</div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--gld);"></span>Admin Notes</div></div>
        <textarea class="fc" id="adminNotesTA" rows="4" placeholder="Internal notes...">${ORDER.admin_notes||''}</textarea>
        <div style="display:flex;gap:10px;align-items:center;margin-top:10px;">
          <button class="btn btn-gld btn-sm" onclick="saveNotes()">Save Notes</button>
          <span id="notesSv" style="font-size:12px;color:var(--ok);display:none;">✔ Saved</span>
        </div>
      </div>
    </div>

    <!-- STATUS HISTORY -->
    <div class="card" style="margin-bottom:18px;">
      <div class="card-head"><div class="card-title"><span class="card-dot" style="background:var(--chr);"></span>Status History</div></div>
      ${statusHist.length ? statusHist.map(h=>`
        <div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--b1);font-size:13px;">
          <div style="width:6px;height:6px;border-radius:50%;background:var(--mg);flex-shrink:0;margin-top:5px;"></div>
          <div>
            <span style="color:var(--txt-m);">${STATUSES[h.from_status]?.label||h.from_status} →</span>
            <strong> ${STATUSES[h.to_status]?.label||h.to_status}</strong>
            ${h.note?`<div style="font-size:12px;color:var(--txt-m);margin-top:2px;">${h.note}</div>`:''}
          </div>
          <div style="margin-left:auto;font-size:11px;color:var(--txt-d);white-space:nowrap;">${formatDate(h.changed_at)}</div>
        </div>`).join('') : '<div style="font-size:13px;color:var(--txt-d);">No status history yet.</div>'}
    </div>

    <!-- DANGER ZONE -->
    <div class="card" style="border-color:rgba(231,76,60,0.2);">
      <div class="card-head"><div class="card-title" style="color:var(--err);">⚠ Actions</div></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-out btn-sm" onclick="setStatus('completed')">✔ Mark Completed</button>
        <button class="btn btn-out btn-sm" onclick="setStatus('shipped')">📦 Mark Shipped</button>
        <button class="btn btn-out btn-sm" onclick="setStatus('closed')">🔒 Close Order</button>
        <button class="btn btn-err btn-sm" onclick="setStatus('cancelled')">✕ Cancel Order</button>
      </div>
    </div>`;
  }

  // ============================================================
  // FEE BUILDER + DOCUMENT GENERATION
  // ============================================================

  // Toggle the fee builder panel open/closed
  function toggleFeeBuilder() {
    const panel = document.getElementById('feeBuilderPanel');
    const btn   = document.getElementById('feeBuilderToggle');
    const open  = panel.style.display === 'none';
    panel.style.display = open ? 'block' : 'none';
    btn.textContent = open ? '✕ Close' : '✏️ Build Fees';
    if (open) {
      updateFeeTotal();
      // Add live-update listeners
      document.querySelectorAll('#standardFeeGrid input').forEach(inp => {
        inp.addEventListener('input', updateFeeTotal);
      });
    }
  }

  // Add a custom fee row (label + amount pair)
  let _customFeeCount = 0;
  function addCustomFeeRow() {
    _customFeeCount++;
    const id  = 'cfr_' + _customFeeCount;
    const div = document.createElement('div');
    div.id    = id;
    div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;';
    div.innerHTML = `
      <input type="text"   class="fc" placeholder="Fee name (e.g. Design Consultation)" style="flex:2;"
        oninput="updateFeeTotal()" />
      <div style="position:relative;flex:1;">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt-m);">$</span>
        <input type="number" class="fc custom-fee-amt" min="0" step="0.01" placeholder="0.00"
          style="padding-left:22px;" oninput="updateFeeTotal()" />
      </div>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('${id}').remove();updateFeeTotal();">✕</button>`;
    document.getElementById('customFeeRows').appendChild(div);
  }

  // Recompute running total from all fee inputs
  function updateFeeTotal() {
    let total = 0;
    ['booking_fee','rush_fee','cleaning_fee','custom_fee','final_balance'].forEach(k => {
      const el = document.getElementById('fee_' + k);
      if (el) total += parseFloat(el.value || 0);
    });
    document.querySelectorAll('.custom-fee-amt').forEach(el => {
      total += parseFloat(el.value || 0);
    });
    const disp = document.getElementById('feeTotalDisplay');
    if (disp) disp.textContent = formatCurrency(total);
    return total;
  }

  // Collect all non-zero line items from the fee builder
  function collectLineItems() {
    const LABELS = {
      booking_fee: 'Booking Fee', rush_fee: 'Rush Fee',
      cleaning_fee: 'Cleaning Fee', custom_fee: 'Custom Fee',
      final_balance: 'Final Balance'
    };
    const items = [];
    ['booking_fee','rush_fee','cleaning_fee','custom_fee','final_balance'].forEach(k => {
      const el  = document.getElementById('fee_' + k);
      const amt = el ? parseFloat(el.value || 0) : 0;
      if (amt > 0) items.push({ label: LABELS[k], amount: amt });
    });
    // Custom rows
    document.querySelectorAll('#customFeeRows > div').forEach(row => {
      const labelEl = row.querySelector('input[type="text"]');
      const amtEl   = row.querySelector('input[type="number"]');
      const lbl     = labelEl ? labelEl.value.trim() : '';
      const amt     = amtEl   ? parseFloat(amtEl.value || 0) : 0;
      if (lbl && amt > 0) items.push({ label: lbl, amount: amt });
    });
    return items;
  }

  // Generate an estimate, invoice, or receipt PDF in-browser,
  // save it to the DB, then re-render the documents list.
  async function generateDoc(docType) {
    const items = collectLineItems();
    if (!items.length) { showToast('Enter at least one fee amount first.'); return; }

    const notes = (document.getElementById('feeNotes') || {}).value || '';
    const year  = new Date().getFullYear();
    const suffix = { estimate:'E', invoice:'I', receipt:'R' }[docType];
    const docNum = `${year}${OID}${suffix}`;
    const subtotal = items.reduce((s,i) => s + i.amount, 0);
    const docLabel = { estimate:'Estimate', invoice:'Invoice', receipt:'Receipt' }[docType];

    // Build PDF HTML as a data-URL using print-friendly markup
    const pdfHtml = buildDocHtml({ docType, docNum, docLabel, items, subtotal, notes, order: ORDER, customer: CUSTOMER });

    // Open print dialog in a new window (acts as PDF export)
    const win = window.open('', '_blank');
    win.document.write(pdfHtml);
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 600);

    // Save to DB
    try {
      const res = await apiFetch('/api/orders/' + OID + '/invoices', {
        method: 'POST',
        body: JSON.stringify({ doc_type: docType, line_items: items, notes })
      });
      if (res && res.invoice) {
        detail.invoices = detail.invoices || [];
        detail.invoices.unshift(res.invoice);
        renderDocuments();
        showToast(`${docLabel} #${docNum} saved! Use "Send to Customer" to share it.`);
      }
    } catch(e) {
      showToast('Saved locally — check API connection.');
    }
  }

  // Build print-ready HTML for the document
  function buildDocHtml({ docType, docNum, docLabel, items, subtotal, notes, order, customer }) {
    const typeColors = { estimate:'#2980b9', invoice:'#c0932b', receipt:'#27ae60' };
    const color = typeColors[docType] || '#c0932b';
    const rows = items.map(i => `
      <tr>
        <td style="padding:10px 14px;border-bottom:1px solid #eee;color:#333;">${i.label}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #eee;text-align:right;font-weight:600;">$${parseFloat(i.amount).toFixed(2)}</td>
      </tr>`).join('');
    return `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
      <title>${docLabel} ${docNum}</title>
      <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Helvetica Neue',Arial,sans-serif;color:#111;background:#fff;padding:48px;}
        .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;}
        .brand{font-size:22px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#111;}
        .brand-sub{font-size:11px;color:#888;letter-spacing:1px;margin-top:3px;}
        .doc-type{font-size:36px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:${color};}
        .doc-num{font-size:13px;color:#888;margin-top:4px;letter-spacing:1px;}
        .meta{display:flex;gap:48px;margin-bottom:32px;padding:20px 0;border-top:2px solid #eee;border-bottom:2px solid #eee;}
        .meta-block .lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#aaa;margin-bottom:5px;}
        .meta-block .val{font-size:14px;font-weight:600;}
        table{width:100%;border-collapse:collapse;margin-bottom:20px;}
        th{background:${color};color:#fff;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:2px;}
        th:last-child{text-align:right;}
        .total-row td{padding:14px;font-size:16px;font-weight:800;border-top:2px solid #111;}
        .total-row td:last-child{color:${color};}
        .notes{margin-top:24px;padding:16px;background:#f9f9f9;border-left:3px solid ${color};font-size:13px;color:#555;}
        .footer{margin-top:48px;text-align:center;font-size:11px;color:#bbb;border-top:1px solid #eee;padding-top:20px;}
        @media print{body{padding:24px;} .no-print{display:none;}}
      </style>
    </head><body>
      <div class="header">
        <div>
          <div class="brand">Cope Aesthetic Customs</div>
          <div class="brand-sub">CopeAestheticCustoms@gmail.com · (919) 295-2569</div>
        </div>
        <div style="text-align:right;">
          <div class="doc-type">${docLabel}</div>
          <div class="doc-num">#${docNum}</div>
          <div style="font-size:11px;color:#aaa;margin-top:4px;">${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
        </div>
      </div>
      <div class="meta">
        <div class="meta-block">
          <div class="lbl">Bill To</div>
          <div class="val">${customer.name||'Customer'}</div>
          <div style="font-size:13px;color:#666;margin-top:2px;">${customer.email||''}</div>
          ${customer.phone?`<div style="font-size:13px;color:#666;">${customer.phone}</div>`:''}
        </div>
        <div class="meta-block">
          <div class="lbl">Order</div>
          <div class="val">#${order.id}</div>
          <div style="font-size:13px;color:#666;margin-top:2px;">${order.item_type||''}</div>
        </div>
        <div class="meta-block">
          <div class="lbl">Date</div>
          <div class="val">${new Date().toLocaleDateString()}</div>
        </div>
      </div>
      <table>
        <thead><tr><th>Description</th><th style="text-align:right;">Amount</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr class="total-row"><td>Total</td><td style="text-align:right;">$${subtotal.toFixed(2)}</td></tr></tfoot>
      </table>
      ${notes ? `<div class="notes"><strong>Notes:</strong> ${notes}</div>` : ''}
      <div class="footer">Cope Aesthetic Customs · customs.copeaesthetic.studio · Thank you! 🎨</div>
    </body></html>`;
  }

  // Render the saved documents list
  function renderDocuments() {
    const docs = (detail.invoices || []);
    const el   = document.getElementById('invoicesList');
    if (!el) return;

    if (!docs.length) {
      el.innerHTML = `<div style="font-size:13px;color:var(--txt-d);padding:16px 0;">No documents yet. Use the fee builder above to generate one.</div>`;
      return;
    }

    const TYPE_ICON  = { estimate:'📋', invoice:'🧾', receipt:'✅' };
    const TYPE_COLOR = { estimate:'var(--chr)', invoice:'var(--gld)', receipt:'var(--ok)' };

    el.innerHTML = `
      <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt-m);padding:14px 0 8px;">Generated Documents</div>
      ${docs.map(d => {
        const icon  = TYPE_ICON[d.doc_type]  || '📄';
        const color = TYPE_COLOR[d.doc_type] || 'var(--gld)';
        const sent  = d.status === 'sent';
        return `
        <div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--b1);flex-wrap:wrap;">
          <div style="width:36px;height:36px;border-radius:8px;background:rgba(216,188,132,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">${icon}</div>
          <div style="flex:1;min-width:160px;">
            <div style="font-size:13px;font-weight:700;color:var(--txt);">${d.doc_type?d.doc_type.charAt(0).toUpperCase()+d.doc_type.slice(1):'Document'} — #${d.doc_number||''}</div>
            <div style="font-size:12px;color:var(--txt-m);">
              ${formatCurrency(d.subtotal||d.amount||0)} · ${(d.line_items||[]).length} line item${(d.line_items||[]).length!==1?'s':''}
            </div>
            ${d.line_items && d.line_items.length ? `
              <div style="font-size:11px;color:var(--txt-d);margin-top:3px;">
                ${d.line_items.map(li => li.label + ': ' + formatCurrency(li.amount)).join(' · ')}
              </div>` : ''}
          </div>
          <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${sent?'var(--ok)':'var(--txt-d)'};">
            ${sent ? '✔ Sent to Customer' : '○ Draft'}
            ${sent && d.sent_at ? `<div style="font-weight:400;text-transform:none;font-size:10px;color:var(--txt-d);">${formatDate(d.sent_at)}</div>` : ''}
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;">
            <button class="btn btn-ghost btn-sm" onclick="previewDoc(${d.id})">👁 Preview</button>
            ${!sent ? `<button class="btn btn-gld btn-sm" onclick="sendDoc(${d.id})">📧 Send to Customer</button>` : ''}
            ${sent ? `<button class="btn btn-ghost btn-sm" onclick="sendDoc(${d.id})">📧 Resend</button>` : ''}
            <button class="btn btn-ghost btn-sm" onclick="deleteDoc(${d.id})" style="color:var(--err);">✕</button>
          </div>
        </div>`;
      }).join('')}
      <div style="margin-top:12px;padding:10px 12px;background:rgba(216,188,132,0.06);border:1px solid rgba(216,188,132,0.12);border-radius:6px;font-size:12px;color:var(--txt-m);">
        💡 "Send to Customer" makes the document visible in their portal.
        <span style="color:var(--txt-d);">Email delivery coming soon via SendGrid.</span>
      </div>`;
  }

  // Preview a saved doc (regenerate HTML from stored line items)
  function previewDoc(docId) {
    const d = (detail.invoices || []).find(i => i.id === docId);
    if (!d) return;
    const TYPE_LABEL = { estimate:'Estimate', invoice:'Invoice', receipt:'Receipt' };
    const pdfHtml = buildDocHtml({
      docType:   d.doc_type,
      docNum:    d.doc_number,
      docLabel:  TYPE_LABEL[d.doc_type] || 'Document',
      items:     d.line_items || [],
      subtotal:  d.subtotal || d.amount || 0,
      notes:     d.notes || '',
      order:     ORDER,
      customer:  CUSTOMER,
    });
    const win = window.open('', '_blank');
    win.document.write(pdfHtml);
    win.document.close();
  }

  // Send a doc to the customer (mark as sent in DB)
  async function sendDoc(docId) {
    const d = (detail.invoices || []).find(i => i.id === docId);
    if (!d) return;
    const label = d.doc_type ? d.doc_type.charAt(0).toUpperCase()+d.doc_type.slice(1) : 'Document';
    if (!confirm(`Send ${label} #${d.doc_number} to ${CUSTOMER.name||'customer'} (${CUSTOMER.email})?`)) return;
    const res = await apiFetch('/api/invoices/' + docId + '/send', { method: 'POST' });
    if (res && res.invoice) {
      const idx = detail.invoices.findIndex(i => i.id === docId);
      if (idx >= 0) detail.invoices[idx] = res.invoice;
      renderDocuments();
      showToast(`${label} sent to customer! 📧`);
    }
  }

  // Delete a doc
  async function deleteDoc(docId) {
    if (!confirm('Delete this document? This cannot be undone.')) return;
    await apiFetch('/api/invoices/' + docId, { method: 'DELETE' });
    detail.invoices = (detail.invoices || []).filter(i => i.id !== docId);
    renderDocuments();
    showToast('Document deleted.');
  }

  // ============================================================
  // CUSTOMER VIEW — open customer portal for this order as admin preview
  // ============================================================
  async function openCustomerView() {
    try {
      const res = await apiFetch('/api/admin/preview-token', {
        method: 'POST',
        body: JSON.stringify({ user_id: ORDER.user_id })
      });
      if (res && res.token) {
        const url = `customer-order-detail.html?id=${OID}&preview_token=${res.token}`;
        window.open(url, '_blank');
      }
    } catch(e) {
      // Fallback: just open in new tab with current admin token
      window.open(`customer-order-detail.html?id=${OID}`, '_blank');
    }
  }

  // Helper
  function irow(label, val, cap=false, color='') {
    return `<div><div class="fl">${label}</div><div style="font-size:14px;${cap?'text-transform:capitalize;':''}${color?`color:${color};`:''}">${val}</div></div>`;
  }


  function renderGallery(id, imgs, allowDel, type) {
    const el = document.getElementById(id);
    if(!el) return;
    if(!imgs.length) { el.innerHTML=`<div class="gmt">No images yet.</div>`; return; }
    el.innerHTML = imgs.map((src,i)=>`
      <div class="gthumb">
        <img src="${src||'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%231F1F1F%22 width=%22100%22 height=%22100%22/%3E%3Ctext fill=%22%23444%22 x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2212%22%3ENo image%3C/text%3E%3C/svg%3E'}" onclick="openLb(this.src)"/>
        ${allowDel?`<button class="gdel" onclick="delImg('${type}',${i})">✕</button>`:''}
      </div>`).join('');
  }

  const galleryMap = {
    'moodboard':  { arr: () => moodboardImgs, setter: (v) => moodboardImgs = v, galId: 'moodboardGal' },
    'concept_art':{ arr: () => conceptImgs,   setter: (v) => conceptImgs = v,   galId: 'conceptGal'   },
    'mockup':     { arr: () => mockupImgs,    setter: (v) => mockupImgs = v,     galId: 'mockupGal'    },
    'base_photo': { arr: () => basePhoots,    setter: (v) => basePhoots = v,     galId: 'baseGal'      },
  };
  let moodboardImgs = [];
  let conceptImgs   = [];

  function handleUpload(e, type) {
    Array.from(e.target.files).forEach(f => {
      const r = new FileReader();
      r.onload = async ev => {
        const url = ev.target.result;
        // Save to API
        const res = await apiFetch('/api/orders/' + OID + '/images', {
          method: 'POST',
          body: JSON.stringify({ url, type })
        });
        if (res && res.ok) {
          const map = galleryMap[type];
          if (map) {
            map.arr().push(url);
            renderGallery(map.galId, map.arr(), true, type);
          }
          showToast('Image uploaded!');
          // Re-render full page if mockup uploaded (shows approval status)
          if (type === 'mockup') {
            const detail = await apiFetch('/api/orders/' + OID);
            if (detail && detail.ok) {
              mockups = detail.data.mockups || [];
              render();
              renderGallery('mockupGal', mockupImgs, true, 'mockup');
            }
          }
        } else {
          showToast('Upload failed — image too large or server error.', 'error');
        }
      };
      r.readAsDataURL(f);
    });
    e.target.value = '';
  }

  function delImg(type, i) {
    if(!confirm('Remove this image?')) return;
    const map = galleryMap[type];
    if (map) { map.arr().splice(i,1); renderGallery(map.galId, map.arr(), true, type); }
  }

  function setupDropZone(zoneId, inputId, cb) {
    const zone=document.getElementById(zoneId);
    if(!zone) return;
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('over');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('over'));
    zone.addEventListener('drop',e=>{
      e.preventDefault(); zone.classList.remove('over');
      const imgs=[]; let done=0;
      const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
      if(!files.length) return;
      files.forEach(f=>{
        const r=new FileReader();
        r.onload=ev=>{ imgs.push(ev.target.result); if(++done===files.length) cb(imgs); };
        r.readAsDataURL(f);
      });
    });
  }

  async function updateStatus(val) {
    const oldStatus = ORDER.status;
    const res = await apiFetch('/api/orders/' + OID, {
      method: 'PATCH',
      body: JSON.stringify({ status: val, note: 'Status updated by admin' })
    });
    if (!res || !res.ok) { showToast('Failed to update status', 'error'); return; }
    ORDER.status = val;
    statusHist.push({ id:Date.now(), order_id:OID, from_status:oldStatus, to_status:val, changed_at:new Date().toISOString(), note:'Updated by admin' });
    render();
    renderInvoices();
    showToast('Status → ' + (STATUSES[val]?.label||val));
  }

  function setStatus(val) {
    if(!confirm(`Change status to "${STATUSES[val]?.label||val}"?`)) return;
    document.getElementById('statusSel').value=val;
    updateStatus(val);
  }

  async function approveRush(approved) {
    const res = await apiFetch('/api/orders/' + OID, {
      method: 'PATCH',
      body: JSON.stringify({ rush_approved: approved, is_rush: approved ? ORDER.is_rush : false })
    });
    if (!res || !res.ok) { showToast('Failed to update rush status', 'error'); return; }
    ORDER.rush_approved=approved;
    if(!approved) ORDER.is_rush=false;
    render();
    showToast(approved?'⚡ Rush approved!':'Rush denied.');
  }

  async function saveTracking(dir) {
    if(dir==='inbound') {
      const v=document.getElementById('inboundIn').value.trim();
      if(!v){showToast('Enter tracking number first.','warning');return;}
      const r = await apiFetch('/api/orders/'+OID, { method:'PATCH', body:JSON.stringify({inbound_tracking:v}) });
      if(r&&r.ok){ORDER.inbound_tracking=v; showToast('Inbound tracking saved!'); render();}
      else showToast('Save failed','error');
    } else {
      const v=document.getElementById('outboundIn').value.trim();
      const c=document.getElementById('carrierSel').value;
      if(!v){showToast('Enter tracking number first.','warning');return;}
      const r = await apiFetch('/api/orders/'+OID, { method:'PATCH', body:JSON.stringify({outbound_tracking:v,outbound_carrier:c}) });
      if(r&&r.ok){ORDER.outbound_tracking=v; ORDER.outbound_carrier=c; showToast('Outbound tracking saved!'); render();}
      else showToast('Save failed','error');
    }
  }

  async function saveNotes() {
    const notes = document.getElementById('adminNotesTA').value;
    const r = await apiFetch('/api/orders/'+OID, { method:'PATCH', body:JSON.stringify({admin_notes:notes}) });
    const el=document.getElementById('notesSv');
    if(r&&r.ok){ORDER.admin_notes=notes; el.style.display='inline'; setTimeout(()=>el.style.display='none',3000); showToast('Notes saved!');}
    else showToast('Save failed','error');
  }

  function openAddPayment() {
    const types=['booking','custom','rush','cleaning','revision','addon'];
    const methods=['Zelle','Venmo','CashApp','PayPal','Other'];
    const modal=document.createElement('div'); modal.className='overlay open'; modal.id='payModal';
    modal.innerHTML=`<div class="modal">
      <button class="modal-x" onclick="document.getElementById('payModal').remove()">✕</button>
      <div class="modal-title">Log Payment</div>
      <div class="fg"><label class="fl">Type</label><select class="fc" id="payType">${types.map(t=>`<option value="${t}" style="text-transform:capitalize;">${t}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Amount</label><input type="number" class="fc" id="payAmt" placeholder="0.00" min="0" step="0.01"/></div>
      <div class="fg"><label class="fl">Method</label><select class="fc" id="payMethod">${methods.map(m=>`<option>${m}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">External Transaction ID (optional)</label><input type="text" class="fc" id="payTxn" placeholder="Zelle confirmation #, etc."/></div>
      <button class="btn btn-mg" style="width:100%;justify-content:center;margin-top:8px;" onclick="logPayment()">Log Payment</button>
    </div>`;
    document.body.appendChild(modal);
  }

  async function logPayment() {
    const amt=parseFloat(document.getElementById('payAmt').value);
    if(!amt){showToast('Enter a valid amount.','warning');return;}
    const r = await apiFetch('/api/payments', { method:'POST', body:JSON.stringify({
      order_id:OID, amount:amt,
      type:document.getElementById('payType').value,
      method:document.getElementById('payMethod').value,
      status:'paid',
      external_txn_id:document.getElementById('payTxn').value||''
    })});
    if(r&&r.ok){
      payments.push(r.data.payment);
      document.getElementById('payModal').remove();
      render(); showToast('Payment logged!');
    } else showToast('Failed to log payment','error');
  }

  function openAddAddon() {
    const modal=document.createElement('div'); modal.className='overlay open'; modal.id='addonModal';
    modal.innerHTML=`<div class="modal">
      <button class="modal-x" onclick="document.getElementById('addonModal').remove()">✕</button>
      <div class="modal-title">Add Add-On Service</div>
      <div class="fg"><label class="fl">Service Name</label>
        <select class="fc" id="addonName">
          <option>AI Product Photography ($35)</option>
          <option>Rush Processing</option>
          <option>Extra Revision ($20)</option>
          <option>Cleaning Fee ($25)</option>
          <option>Custom Add-On</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Price</label><input type="number" class="fc" id="addonPrice" placeholder="35.00" min="0" step="0.01"/></div>
      <div class="fg"><label class="fl">Quantity</label><input type="number" class="fc" id="addonQty" value="1" min="1"/></div>
      <button class="btn btn-mg" style="width:100%;justify-content:center;margin-top:8px;" onclick="addAddon()">Add</button>
    </div>`;
    document.body.appendChild(modal);
  }

  async function addAddon() {
    const r = await apiFetch('/api/add_ons', { method:'POST', body:JSON.stringify({
      order_id:OID,
      name:document.getElementById('addonName').value,
      price:parseFloat(document.getElementById('addonPrice').value)||0,
      quantity:parseInt(document.getElementById('addonQty').value)||1
    })});
    if(r&&r.ok){
      addons.push(r.data.add_on);
      document.getElementById('addonModal').remove();
      render(); showToast('Add-on added!');
    } else showToast('Failed to add add-on','error');
  }

  function openAddRevision() {
    const usedRevs=revisions.length, freeRevs=3;
    const isPaid=usedRevs>=freeRevs;
    const modal=document.createElement('div'); modal.className='overlay open'; modal.id='revModal';
    modal.innerHTML=`<div class="modal">
      <button class="modal-x" onclick="document.getElementById('revModal').remove()">✕</button>
      <div class="modal-title">Add Revision Note</div>
      ${isPaid?`<div style="padding:10px 12px;background:rgba(232,160,32,0.1);border:1px solid rgba(232,160,32,0.25);border-radius:6px;font-size:12px;color:var(--warn);margin-bottom:16px;">This revision (${usedRevs+1}) exceeds the 3 free included — a charge will apply.</div>`:''}
      <div class="fg"><label class="fl">Revision Notes</label><textarea class="fc" id="revNotes" rows="4" placeholder="Describe what changes are needed..."></textarea></div>
      ${isPaid?`<div class="fg"><label class="fl">Charge Amount</label><input type="number" class="fc" id="revCharge" placeholder="20.00" value="20" min="0" step="0.01"/></div>`:''}
      <button class="btn btn-mg" style="width:100%;justify-content:center;margin-top:8px;" onclick="logRevision()">Save Revision</button>
    </div>`;
    document.body.appendChild(modal);
  }

  async function logRevision() {
    const r = await apiFetch('/api/revisions', { method:'POST', body:JSON.stringify({
      order_id:OID,
      notes:document.getElementById('revNotes').value,
    })});
    if(r&&r.ok){
      revisions.push(r.data.revision);
      document.getElementById('revModal').remove();
      render(); showToast('Revision #'+revisions.length+' logged!');
    } else showToast('Failed to log revision','error');
  }

  function openScheduleConsult() {
    const modal=document.createElement('div'); modal.className='overlay open'; modal.id='consultModal';
    modal.innerHTML=`<div class="modal">
      <button class="modal-x" onclick="document.getElementById('consultModal').remove()">✕</button>
      <div class="modal-title">Schedule Consult Call</div>
      <div class="fg"><label class="fl">Date & Time</label><input type="datetime-local" class="fc" id="consultDt"/></div>
      <div class="fg"><label class="fl">Duration (minutes)</label><select class="fc" id="consultDur"><option value="15">15 min</option><option value="30" selected>30 min</option><option value="45">45 min</option><option value="60">60 min</option></select></div>
      <div class="fg"><label class="fl">Call Topic / Notes</label><textarea class="fc" id="consultNotes" rows="3" placeholder="What will you discuss?"></textarea></div>
      <button class="btn btn-mg" style="width:100%;justify-content:center;margin-top:8px;" onclick="saveConsult()">Schedule</button>
    </div>`;
    document.body.appendChild(modal);
  }

  async function saveConsult() {
    const dt=document.getElementById('consultDt').value;
    if(!dt){showToast('Select a date and time.','warning');return;}
    const r = await apiFetch('/api/consult_calls', { method:'POST', body:JSON.stringify({
      order_id:OID,
      scheduled_at:new Date(dt).toISOString(),
      duration_minutes:parseInt(document.getElementById('consultDur').value),
      notes:document.getElementById('consultNotes').value
    })});
    if(r&&r.ok){
      consults.push(r.data.consult_call);
      document.getElementById('consultModal').remove();
      render(); showToast('Consult scheduled!');
    } else showToast('Failed to schedule consult','error');
  }

  function openLb(src) { document.getElementById('lbImg').src=src; document.getElementById('lb').classList.add('open'); }
  function closeLb()   { document.getElementById('lb').classList.remove('open'); }
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLb(); });

  function setupDropZonesAfterLoad() {
    // Galleries already rendered in loadOrderDetail
    // Set up drop zones for Buffy's upload sections
    setupDropZone('moodboardDrop','moodboardFile', imgs => {
      moodboardImgs.push(...imgs);
      renderGallery('moodboardGal', moodboardImgs, true, 'moodboard');
    });
    setupDropZone('conceptDrop','conceptFile', imgs => {
      conceptImgs.push(...imgs);
      renderGallery('conceptGal', conceptImgs, true, 'concept_art');
    });
    setupDropZone('mockupDrop','mockupFile', imgs => {
      mockupImgs.push(...imgs);
      renderGallery('mockupGal', mockupImgs, true, 'mockup');
    });
    setupDropZone('baseDrop','baseFile', imgs => {
      basePhoots.push(...imgs);
      renderGallery('baseGal', basePhoots, false, 'base_photo');
    });
  }
</script>

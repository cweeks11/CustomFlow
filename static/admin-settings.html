<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Settings — Cope Aesthetic Customs</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<!--
  PAGE: Admin Settings (admin-settings.html)
  ============================================================
  PURPOSE:
    Store configuration and preferences for Buffy. The most important
    section is Booking & Availability — this controls what customers
    see on the public landing page about Buffy's availability.

  WHAT'S ON THIS PAGE (accordion sections):
    1. General Settings    — business name, contact info, timezone
    2. Booking & Availability — booking status, booked-until date,
                                production start date, banner message
                                (saves to localStorage, read by landing.html)
    3. User Management     — add/remove admin and employee accounts
    4. Notification Settings — toggle email/SMS notification types
    5. FAQ Management      — edit, add, remove FAQ items (saves to MOCK.faqs)
    6. Pricing Tiers       — display-only view of pricing (edit in core.js)

  KEY FUNCTIONS:
    toggleAcc(head)   — opens/closes accordion sections, ensures only one
                        is open at a time
    buildBooking(el)  — renders the booking form, pre-fills from localStorage
    saveBooking()     — saves booking status values to localStorage so
                        landing.html and customer-terms.html update immediately
    buildFaqs(el)     — renders editable FAQ list from MOCK.faqs
    renderFaqEdit()   — re-renders the FAQ edit list after add/remove
    saveFaqs()        — writes edited FAQs back to MOCK.faqs
    buildUsers(el)    — renders admin/employee user table
    openAddUser()     — modal for creating a new admin user

  IMPORTANT — BOOKING STATUS FLOW:
    Admin changes status here → saved to localStorage →
    getBookingStatus() in core.js reads it →
    landing.html banner updates automatically on next load
    In production: also save to a settings table via PATCH /api/settings/booking

  BACKEND TODO:
    saveBooking()  → PATCH /api/settings/booking
    saveFaqs()     → PUT /api/faqs (array of {q, a} objects)
    addUser()      → POST /api/users  { name, email, role, password }
    removeUser()   → DELETE /api/users/:id
  ============================================================
-->
<script src="core.js"></script>
<script src="navbar.js"></script>

<div class="page">
  <div class="page-head">
    <div><div class="page-title">Settings</div><div class="page-sub">Store configuration and preferences</div></div>
  </div>

  <div id="accWrap"></div>
</div>
<div class="toast" id="toast"></div>

<script>

  requireAdminAuth();
  renderAdminNav('admin-settings.html');

  // Build accordions
  const sections = [
    { id:'general',  icon:'⚙️', label:'General Settings',     fn:buildGeneral  },
    { id:'booking',  icon:'📅', label:'Booking & Availability',fn:buildBooking  },
    { id:'users',    icon:'👥', label:'User Management',       fn:buildUsers    },
    { id:'notifs',   icon:'🔔', label:'Notification Settings', fn:buildNotifs   },
    { id:'faqs',     icon:'❓', label:'FAQ Management',        fn:buildFaqs     },
    { id:'pricing',  icon:'💰', label:'Pricing Tiers',         fn:buildPricing  },
  ];

  document.getElementById('accWrap').innerHTML = sections.map((s,i)=>`
    <div class="acc-item">
      <div class="acc-head${i===0?' open':''}" onclick="toggleAcc(this)" id="ah-${s.id}">
        <div style="display:flex;align-items:center;gap:10px;"><span>${s.icon}</span>${s.label}</div>
        <span class="acc-arr">▾</span>
      </div>
      <div class="acc-body${i===0?' open':''}" id="ab-${s.id}">
        <div id="ab-inner-${s.id}">Loading...</div>
      </div>
    </div>`).join('');


  function toggleAcc(head) {
    const isOpen = head.classList.contains('open');
    document.querySelectorAll('.acc-head').forEach(h=>h.classList.remove('open'));
    document.querySelectorAll('.acc-body').forEach(b=>b.classList.remove('open'));
    if(!isOpen) {
      head.classList.add('open');
      head.nextElementSibling.classList.add('open');
    }
  }

  function saved(btnId) {
    const el=document.getElementById(btnId);
    if(!el) return;
    const orig=el.textContent;
    el.textContent='✔ Saved!'; el.style.color='var(--ok)';
    setTimeout(()=>{ el.textContent=orig; el.style.color=''; },3000);
  }

  // ---- GENERAL ----
  function buildGeneral(el) {
    el.innerHTML = `
      <div class="g2" style="margin-bottom:16px;">
        <div class="fg"><label class="fl">Business Name</label><input type="text" class="fc" id="bizName" value="Cope Aesthetic Customs"/></div>
        <div class="fg"><label class="fl">Owner Name</label><input type="text" class="fc" id="ownerName" value="Buffy Cope"/></div>
        <div class="fg"><label class="fl">Contact Email</label><input type="email" class="fc" id="bizEmail" value="CopeAestheticCustoms@gmail.com"/></div>
        <div class="fg"><label class="fl">Phone / WhatsApp</label><input type="text" class="fc" id="bizPhone" value="(919) 295-2569"/></div>
        <div class="fg"><label class="fl">Timezone</label>
          <select class="fc" id="tz">
            <option>America/New_York (EST)</option>
            <option>America/Chicago (CST)</option>
            <option>America/Los_Angeles (PST)</option>
          </select>
        </div>
        <div class="fg"><label class="fl">Language</label>
          <select class="fc" id="lang"><option>English</option><option>Spanish</option></select>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="btn btn-gld" onclick="saveGeneral()">Save Changes</button>
        <span id="genSv" style="font-size:12px;color:var(--ok);display:none;">✔ Saved!</span>
      </div>`;
  }

  function saveGeneral() {
    const el=document.getElementById('genSv');
    el.style.display='inline'; setTimeout(()=>el.style.display='none',3000);
    showToast('General settings saved!');
  }

  // ---- BOOKING ----
  async function buildBooking(el) {
    // Load from real API, fall back to localStorage
    let bs = { status:'waitlist', until:'2026-05-18', message:'', prod_start:'May 18, 2026' };
    try {
      const res = await apiFetch('/api/settings/booking');
      if (res && res.ok) bs = res.data;
    } catch(e) {}
    el.innerHTML = `
      <div style="padding:14px;background:rgba(242,23,165,0.05);border:1px solid rgba(242,23,165,0.12);border-radius:8px;margin-bottom:20px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mg);margin-bottom:6px;">Live on landing page</div>
        <div style="font-size:13px;color:var(--txt-m);">This section controls what customers see on the public landing page about your availability.</div>
      </div>
      <div class="g2" style="margin-bottom:16px;">
        <div class="fg">
          <label class="fl">Booking Status</label>
          <select class="fc" id="bkStatus">
            <option value="open"     ${bs.status==='open'    ?'selected':''}>🟢 Open — Accepting Orders</option>
            <option value="waitlist" ${bs.status==='waitlist'?'selected':''}>🟡 Waitlist Only</option>
            <option value="booked"   ${bs.status==='booked'  ?'selected':''}>🔴 Fully Booked — Not Accepting</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">Booked Until Date</label>
          <input type="date" class="fc" id="bkUntil" value="${bs.until||'2026-05-18'}"/>
        </div>
        <div class="fg">
          <label class="fl">Current Production Start Date</label>
          <input type="text" class="fc" id="bkProdStart" value="${bs.prod_start||'May 18, 2026'}" placeholder="e.g. May 18, 2026"/>
        </div>
        <div class="fg">
          <label class="fl">Custom Banner Message</label>
          <input type="text" class="fc" id="bkMsg" value="${bs.message||''}" placeholder="e.g. Currently booked through May 18..."/>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="btn btn-gld" onclick="saveBooking()">Save & Update Landing Page</button>
        <span id="bkSv" style="font-size:12px;color:var(--ok);display:none;">✔ Saved! Landing page updated.</span>
      </div>`;
  }

  async function saveBooking() {
    const status   = document.getElementById('bkStatus').value;
    const until    = document.getElementById('bkUntil').value;
    const message  = document.getElementById('bkMsg').value;
    const prod_start = document.getElementById('bkProdStart').value;
    const res = await apiFetch('/api/settings/booking', {
      method: 'PATCH',
      body: JSON.stringify({ status, until, message, prod_start })
    });
    // Also save to localStorage as fallback
    localStorage.setItem('booking_status',  status);
    localStorage.setItem('booked_until',    until);
    localStorage.setItem('booking_message', message);
    localStorage.setItem('prod_start',      prod_start);
    const el=document.getElementById('bkSv');
    if (res && res.ok) {
      el.style.display='inline'; setTimeout(()=>el.style.display='none',4000);
      showToast('Booking status updated!');
    } else {
      showToast('Save failed', 'error');
    }
  }

  // ---- USERS ----
  let userTab = 'customers'; // 'customers' | 'admins'

  async function buildUsers(el) {
    const res = await apiFetch('/api/users');
    const allUsers = (res && res.ok) ? res.data : [];
    const customers = allUsers.filter(u => u.role === 'customer');
    const admins    = allUsers.filter(u => u.role !== 'customer');
    const current   = userTab === 'customers' ? customers : admins;
    const me        = JSON.parse(localStorage.getItem('admin_user')||'{}');

    el.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm ${userTab==='customers'?'btn-mg':'btn-out'}" onclick="userTab='customers';buildUsers(document.getElementById('ab-inner-users'))">
            Customers (${customers.length})
          </button>
          <button class="btn btn-sm ${userTab==='admins'?'btn-mg':'btn-out'}" onclick="userTab='admins';buildUsers(document.getElementById('ab-inner-users'))">
            Admin / Staff (${admins.length})
          </button>
        </div>
        <button class="btn btn-mg btn-sm" onclick="openAddUser()">+ Add User</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Type</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
          <tbody>
            ${current.map(u=>{
              const ct = u.customer_type||'individual';
              const SPECIAL = {group:'👥 Group',influencer:'⭐ Influencer',nonprofit:'🤝 Non-Profit',organization:'🏢 Org'};
              const typeBadge = SPECIAL[ct]
                ? `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;background:rgba(231,167,51,0.12);border:1px solid rgba(231,167,51,0.25);font-size:10px;font-weight:700;color:var(--gld);">${SPECIAL[ct]}</span>`
                : `<span style="font-size:11px;color:var(--txt-d);">Individual</span>`;
              return `<tr style="${!u.is_active?'opacity:0.5;':''}">
              <td><strong>${u.name}</strong></td>
              <td style="font-size:12px;color:var(--txt-m);">${u.email}</td>
              <td style="font-size:12px;color:var(--txt-m);">${u.phone||'—'}</td>
              <td>${typeBadge}</td>
              <td><span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${u.role==='owner'?'var(--gld)':u.role==='employee'?'var(--chr)':'var(--txt-m)'};">${u.role}</span></td>
              <td>${u.is_active!==false
                ? '<span style="color:var(--ok);font-size:11px;font-weight:700;">Active</span>'
                : '<span style="color:var(--err);font-size:11px;font-weight:700;">Deactivated</span>'}</td>
              <td>${formatDate(u.created_at)}</td>
              <td style="display:flex;gap:6px;flex-wrap:wrap;">
                <button class="btn btn-sm btn-out" onclick="openEditUser(${u.id},'${u.name.replace(/'/g,"\'")}','${u.email}','${u.phone||''}','${u.role}',${u.is_active!==false},'${ct}')">Edit</button>
                ${u.is_active!==false
                  ? `<button class="btn btn-sm" style="background:rgba(232,160,32,0.15);color:var(--warn);border-color:rgba(232,160,32,0.3);" onclick="toggleUserActive(${u.id},false)">Deactivate</button>`
                  : `<button class="btn btn-sm btn-out" onclick="toggleUserActive(${u.id},true)">Activate</button>`}
                ${u.id!==me.id?`<button class="btn btn-sm btn-err" onclick="deleteUser(${u.id},'${u.name.replace(/'/g,"\'")}')">Delete</button>`:''}
              </td>
            </tr>`}).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function openAddUser() {
    const modal = document.createElement('div');
    modal.className = 'overlay open';
    modal.id = 'userModal';
    modal.innerHTML = `<div class="modal">
      <button class="modal-x" onclick="document.getElementById('userModal').remove()">✕</button>
      <div class="modal-title">Add New User</div>
      <div class="fg"><label class="fl">Full Name</label><input type="text" class="fc" id="uName" placeholder="Jane Doe"/></div>
      <div class="fg"><label class="fl">Email</label><input type="email" class="fc" id="uEmail" placeholder="jane@email.com"/></div>
      <div class="fg"><label class="fl">Phone</label><input type="text" class="fc" id="uPhone" placeholder="(555) 000-0000"/></div>
      <div class="fg"><label class="fl">Role</label>
        <select class="fc" id="uRole">
          <option value="customer">Customer</option>
          <option value="employee">Employee</option>
          <option value="owner">Owner</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Temporary Password</label><input type="password" class="fc" id="uPw" placeholder="Min 6 characters"/></div>
      <button class="btn btn-mg" style="width:100%;justify-content:center;margin-top:8px;" onclick="addUser()">Create User</button>
    </div>`;
    document.body.appendChild(modal);
  }

  async function addUser() {
    const name  = document.getElementById('uName').value.trim();
    const email = document.getElementById('uEmail').value.trim();
    const phone = document.getElementById('uPhone').value.trim();
    const role  = document.getElementById('uRole').value;
    const pw    = document.getElementById('uPw').value;
    if (!name || !email || !pw) { showToast('Name, email and password required.', 'warning'); return; }
    if (pw.length < 6) { showToast('Password must be at least 6 characters.', 'warning'); return; }
    const res = await apiFetch('/api/register', {
      method: 'POST',
      body: JSON.stringify({ name, email, password: pw, phone, role })
    });
    if (res && res.ok) {
      // Update role if not customer (register defaults to customer)
      if (role !== 'customer') {
        await apiFetch('/api/users/' + res.data.user.id, {
          method: 'PATCH',
          body: JSON.stringify({ role })
        });
      }
      showToast('User created!');
      document.getElementById('userModal').remove();
      buildUsers(document.getElementById('ab-inner-users'));
    } else {
      showToast(res?.data?.error || 'Failed to create user.', 'error');
    }
  }

  function openEditUser(id, name, email, phone, role, isActive, customerType='individual') {
    const modal = document.createElement('div');
    modal.className = 'overlay open';
    modal.id = 'editUserModal';
    const ctOpts = [
      ['individual','Individual / Personal'],
      ['group','Group'],
      ['influencer','Influencer / Content Creator'],
      ['nonprofit','Non-Profit Organization'],
      ['organization','Organization / Business'],
    ].map(([v,l])=>`<option value="${v}" ${customerType===v?'selected':''}>${l}</option>`).join('');
    modal.innerHTML = `<div class="modal">
      <button class="modal-x" onclick="document.getElementById('editUserModal').remove()">✕</button>
      <div class="modal-title">Edit User</div>
      <div class="fg"><label class="fl">Full Name</label><input type="text" class="fc" id="euName" value="${name}"/></div>
      <div class="fg"><label class="fl">Email</label><input type="email" class="fc" id="euEmail" value="${email}"/></div>
      <div class="fg"><label class="fl">Phone</label><input type="text" class="fc" id="euPhone" value="${phone}"/></div>
      <div class="fg"><label class="fl">Role</label>
        <select class="fc" id="euRole">
          <option value="customer" ${role==='customer'?'selected':''}>Customer</option>
          <option value="employee" ${role==='employee'?'selected':''}>Employee</option>
          <option value="owner" ${role==='owner'?'selected':''}>Owner</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Account Type</label>
        <select class="fc" id="euType">${ctOpts}</select>
      </div>
      <button class="btn btn-gld" style="width:100%;justify-content:center;margin-top:8px;" onclick="saveEditUser(${id})">Save Changes</button>
    </div>`;
    document.body.appendChild(modal);
  }

  async function saveEditUser(id) {
    const res = await apiFetch('/api/users/' + id, {
      method: 'PATCH',
      body: JSON.stringify({
        name:          document.getElementById('euName').value.trim(),
        email:         document.getElementById('euEmail').value.trim(),
        phone:         document.getElementById('euPhone').value.trim(),
        role:          document.getElementById('euRole').value,
        customer_type: document.getElementById('euType').value,
      })
    });
    if (res && res.ok) {
      showToast('User updated!');
      document.getElementById('editUserModal').remove();
      buildUsers(document.getElementById('ab-inner-users'));
    } else {
      showToast(res?.data?.error || 'Failed to update user.', 'error');
    }
  }

  async function toggleUserActive(id, active) {
    const action = active ? 'activate' : 'deactivate';
    if (!confirm(`${active?'Activate':'Deactivate'} this account?`)) return;
    const res = await apiFetch('/api/users/' + id, {
      method: 'PATCH',
      body: JSON.stringify({ is_active: active })
    });
    if (res && res.ok) {
      showToast(`Account ${action}d.`);
      buildUsers(document.getElementById('ab-inner-users'));
    } else {
      showToast('Failed to update account.', 'error');
    }
  }

  async function deleteUser(id, name) {
    if (!confirm(`Permanently delete ${name}'s account? This cannot be undone.`)) return;
    const res = await apiFetch('/api/users/' + id, { method: 'DELETE' });
    if (res && res.ok) {
      showToast('Account deleted.');
      buildUsers(document.getElementById('ab-inner-users'));
    } else {
      showToast(res?.data?.error || 'Failed to delete account.', 'error');
    }
  }

  // Keep legacy removeUser for compatibility
  function removeUser(id) { deleteUser(id, 'this user'); }

  // ---- NOTIFICATIONS ----
  function buildNotifs(el) {
    el.innerHTML = `
      <div style="font-size:13px;color:var(--txt-m);margin-bottom:16px;">Configure how Buffy and customers receive notifications.</div>
      <div class="tog-row"><span class="tog-lbl">Email notifications to Buffy</span><label class="toggle"><input type="checkbox" id="nEmail" checked/><span class="tslider"></span></label></div>
      <div class="tog-row"><span class="tog-lbl">New order alerts</span><label class="toggle"><input type="checkbox" id="nNewOrder" checked/><span class="tslider"></span></label></div>
      <div class="tog-row"><span class="tog-lbl">Rush order alerts</span><label class="toggle"><input type="checkbox" id="nRush" checked/><span class="tslider"></span></label></div>
      <div class="tog-row"><span class="tog-lbl">Customer email status updates</span><label class="toggle"><input type="checkbox" id="nCustStatus" checked/><span class="tslider"></span></label></div>
      <div class="tog-row"><span class="tog-lbl">Customer shipment notifications</span><label class="toggle"><input type="checkbox" id="nShip" checked/><span class="tslider"></span></label></div>
      <div style="margin-top:16px;display:flex;align-items:center;gap:12px;">
        <button class="btn btn-gld" onclick="saveNotifs()">Save</button>
        <span id="nSv" style="font-size:12px;color:var(--ok);display:none;">✔ Saved!</span>
      </div>`;
  }

  function saveNotifs() { const el=document.getElementById('nSv'); el.style.display='inline'; setTimeout(()=>el.style.display='none',3000); }

  // ---- FAQS ----
  let faqs = [];
  // ---- FAQS — fully connected to API ----
  async function buildFaqs(el) {
    // Always reload from API when section opens
    try {
      const faqsRes = await apiFetch('/api/faqs');
      if (faqsRes && faqsRes.ok) faqs = faqsRes.data || [];
    } catch(e) {}

    el.innerHTML = `
      <div style="font-size:13px;color:var(--txt-m);margin-bottom:16px;">These FAQs appear on the customer Terms & FAQs page and Customer Portal. Changes save to the database immediately.</div>
      <div id="faqEdit"></div>
      <div style="margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-out btn-sm" onclick="addFaq()">+ Add FAQ</button>
        <button class="btn btn-gld" onclick="saveFaqs()">Save All FAQs</button>
        <span id="faqSv" style="font-size:12px;color:var(--ok);display:none;">✔ Saved to database!</span>
      </div>`;
    renderFaqEdit();
  }

  function renderFaqEdit() {
    const el = document.getElementById('faqEdit');
    if (!el) return;
    el.innerHTML = faqs.map((f,i) => `
      <div style="background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:14px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-d);">FAQ ${i+1}</span>
          <button class="btn btn-err btn-sm" onclick="removeFaq(${i})">Remove</button>
        </div>
        <div class="fg" style="margin-bottom:10px;">
          <label class="fl">Question</label>
          <input type="text" class="fc" id="fq_${i}" value="${(f.q||f.question||'').replace(/"/g,'&quot;')}" oninput="faqs[${i}].q=this.value;faqs[${i}].question=this.value"/>
        </div>
        <div class="fg" style="margin-bottom:0;">
          <label class="fl">Answer</label>
          <textarea class="fc" rows="2" id="fa_${i}" oninput="faqs[${i}].a=this.value;faqs[${i}].answer=this.value">${f.a||f.answer||''}</textarea>
        </div>
      </div>`).join('') || '<div style="font-size:13px;color:var(--txt-d);padding:20px 0;">No FAQs yet. Click + Add FAQ to create one.</div>';
  }

  function addFaq() {
    faqs.push({ q:'', a:'', question:'', answer:'' });
    renderFaqEdit();
    // Scroll to bottom of faqEdit
    const el = document.getElementById('faqEdit');
    if(el) el.lastElementChild?.scrollIntoView({ behavior:'smooth' });
  }

  function removeFaq(i) {
    faqs.splice(i, 1);
    renderFaqEdit();
  }

  async function saveFaqs() {
    const el = document.getElementById('faqSv');

    // Read current values from the DOM inputs (not stale faqs array)
    const inputs = document.querySelectorAll('#faqEdit > div');
    const currentFaqs = [];
    inputs.forEach((div, i) => {
      const qEl = div.querySelector(`#fq_${i}`);
      const aEl = div.querySelector(`#fa_${i}`);
      if (qEl && aEl) {
        const q = qEl.value.trim();
        const a = aEl.value.trim();
        if (q || a) currentFaqs.push({ q, a, id: faqs[i]?.id || null });
      }
    });

    if (!currentFaqs.length) {
      showToast('No FAQs to save.', 'warning');
      return;
    }

    // Validate
    const incomplete = currentFaqs.filter(f => !f.q || !f.a);
    if (incomplete.length) {
      showToast('Please fill in all questions and answers before saving.', 'warning');
      return;
    }

    let allOk = true;

    // For FAQs with an existing id: update via PATCH
    // For new FAQs (no id): create via POST
    // Then delete any FAQs that were removed
    const existingRes = await apiFetch('/api/faqs');
    const existingIds = existingRes && existingRes.ok ? existingRes.data.map(f => f.id) : [];
    const keepIds = currentFaqs.filter(f => f.id).map(f => f.id);
    const toDelete = existingIds.filter(id => !keepIds.includes(id));

    // Delete removed FAQs
    for (const id of toDelete) {
      await apiFetch('/api/faqs/' + id, { method: 'DELETE' });
    }

    // Update or create each FAQ
    const newFaqs = [];
    for (let i = 0; i < currentFaqs.length; i++) {
      const f = currentFaqs[i];
      let res;
      if (f.id) {
        // Update existing
        res = await apiFetch('/api/faqs/' + f.id, {
          method: 'PATCH',
          body: JSON.stringify({ question: f.q, answer: f.a, sort_order: i })
        });
      } else {
        // Create new
        res = await apiFetch('/api/faqs', {
          method: 'POST',
          body: JSON.stringify({ question: f.q, answer: f.a, sort_order: i })
        });
      }
      if (!res || !res.ok) { allOk = false; }
      else { newFaqs.push(res.data); }
    }

    if (allOk) {
      el.style.display = 'inline';
      setTimeout(() => el.style.display = 'none', 3000);
      showToast('FAQs saved!');
      // Reload from DB to sync IDs
      const reloaded = await apiFetch('/api/faqs');
      if (reloaded && reloaded.ok) { faqs = reloaded.data; renderFaqEdit(); }
    } else {
      showToast('Some FAQs failed to save — please try again.', 'error');
    }
  }

  // ---- PRICING ----
  let pricingTiers = [];
  let _deletedTierIds = [];  // track IDs deleted this session so we can DELETE them on save

  async function buildPricing(el) {
    // Load from API
    try {
      const res = await apiFetch('/api/pricing_tiers/all');
      if (res && res.ok) pricingTiers = res.data || [];
    } catch(e) {}
    _deletedTierIds = [];

    el.innerHTML = `
      <div style="font-size:13px;color:var(--txt-m);margin-bottom:16px;">These pricing tiers appear on the Terms & FAQs page. Customers see them before registering.</div>
      <div id="pricingEdit"></div>
      <div style="margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-out btn-sm" onclick="addPricingTier()">+ Add Tier</button>
        <button class="btn btn-gld" onclick="savePricingTiers()">Save All Tiers</button>
        <span id="priceSv" style="font-size:12px;color:var(--ok);display:none;">✔ Saved!</span>
      </div>`;
    renderPricingEdit();
  }

  function renderPricingEdit() {
    const el = document.getElementById('pricingEdit');
    if (!el) return;
    el.innerHTML = pricingTiers.map((t,i) => `
      <div style="background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:14px;margin-bottom:10px;${!t.is_active?'opacity:0.5;':''}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <span style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-d);">Tier ${i+1}</span>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-sm btn-out" onclick="togglePricingActive(${i})">${t.is_active!==false?'Hide':'Show'}</button>
            <button class="btn btn-sm btn-err" onclick="removePricingTier(${i})">Remove</button>
          </div>
        </div>
        <div class="g2" style="margin-bottom:10px;">
          <div class="fg">
            <label class="fl">Tier Name</label>
            <input type="text" class="fc" id="pt_name_${i}" value="${(t.name||'').replace(/"/g,'&quot;')}" oninput="pricingTiers[${i}].name=this.value"/>
          </div>
          <div class="fg">
            <label class="fl">Price Label (e.g. $75+ or Varies)</label>
            <input type="text" class="fc" id="pt_label_${i}" value="${(t.price_label||'').replace(/"/g,'&quot;')}" oninput="pricingTiers[${i}].price_label=this.value"/>
          </div>
        </div>
        <div class="fg" style="margin-bottom:0;">
          <label class="fl">Description</label>
          <textarea class="fc" rows="2" id="pt_desc_${i}" oninput="pricingTiers[${i}].description=this.value">${t.description||''}</textarea>
        </div>
      </div>`).join('') || '<div style="font-size:13px;color:var(--txt-d);padding:20px 0;">No pricing tiers yet. Click + Add Tier to create one.</div>';
  }

  function addPricingTier() {
    pricingTiers.push({ name:'', price_label:'', description:'', is_active:true, id:null });
    renderPricingEdit();
  }

  async function removePricingTier(i) {
    const t = pricingTiers[i];
    if (!confirm(`Remove "${t.name || 'this tier'}"? This will delete it from the database immediately.`)) return;
    // If it has a real DB id, delete it from the server right now
    if (t.id) {
      const res = await apiFetch('/api/pricing_tiers/' + t.id, { method: 'DELETE' });
      if (!res || !res.ok) {
        showToast('Failed to delete tier — please try again.', 'error');
        return;
      }
    }
    pricingTiers.splice(i, 1);
    renderPricingEdit();
    showToast('Tier removed.');
  }

  function togglePricingActive(i) {
    pricingTiers[i].is_active = !pricingTiers[i].is_active;
    renderPricingEdit();
  }

  async function savePricingTiers() {
    const el = document.getElementById('priceSv');

    // Read current values from DOM
    pricingTiers.forEach((t, i) => {
      const nameEl  = document.getElementById(`pt_name_${i}`);
      const labelEl = document.getElementById(`pt_label_${i}`);
      const descEl  = document.getElementById(`pt_desc_${i}`);
      if (nameEl)  t.name        = nameEl.value.trim();
      if (labelEl) t.price_label = labelEl.value.trim();
      if (descEl)  t.description = descEl.value.trim();
    });

    const valid = pricingTiers.filter(t => t.name.trim());
    if (!valid.length) { showToast('Please add at least one pricing tier.', 'warning'); return; }

    let allOk = true;

    for (let i = 0; i < pricingTiers.length; i++) {
      const t = pricingTiers[i];
      if (!t.name.trim()) continue;
      let res;
      if (t.id) {
        res = await apiFetch('/api/pricing_tiers/' + t.id, {
          method: 'PATCH',
          body: JSON.stringify({ name: t.name, price_label: t.price_label, description: t.description, is_active: t.is_active!==false, sort_order: i })
        });
      } else {
        res = await apiFetch('/api/pricing_tiers', {
          method: 'POST',
          body: JSON.stringify({ name: t.name, price_label: t.price_label, description: t.description, is_active: t.is_active!==false, sort_order: i })
        });
      }
      if (!res || !res.ok) allOk = false;
    }

    if (allOk) {
      el.style.display = 'inline';
      setTimeout(() => el.style.display = 'none', 3000);
      showToast('Pricing tiers saved!');
      // Reload to sync IDs
      const reloaded = await apiFetch('/api/pricing_tiers/all');
      if (reloaded && reloaded.ok) { pricingTiers = reloaded.data; renderPricingEdit(); }
    } else {
      showToast('Some tiers failed to save — please try again.', 'error');
    }
  }


  // Init — called after all functions defined
  sections.forEach(s => {
    if (s.fn.constructor.name === "AsyncFunction") {
      s.fn(document.getElementById(`ab-inner-${s.id}`));
    } else {
      s.fn(document.getElementById(`ab-inner-${s.id}`));
    }
  });
</script>
</body>
</html>
